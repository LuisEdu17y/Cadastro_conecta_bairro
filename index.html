<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos - Conecta Bairro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center" style="max-width: 500px;">
            <a class="navbar-brand fw-bold text-primary m-0" href="#">
                <i class="bi bi-geo-alt-fill"></i> Conecta Bairro
            </a>
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 35px; height: 35px;">
                <i class="bi bi-person-fill"></i>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 500px;">
        <h4 class="fw-bold text-dark mb-3">Próximos Eventos</h4>
        
        <div class="d-flex gap-2 overflow-auto mb-4 pb-2" style="white-space: nowrap;">
            <button class="btn btn-primary rounded-pill px-4 btn-filtro" data-filtro="Todos">Todos</button>
            <button class="btn btn-outline-primary rounded-pill px-4 btn-filtro" data-filtro="Futebol">Futebol</button>
            <button class="btn btn-outline-primary rounded-pill px-4 btn-filtro" data-filtro="Zumba">Zumba</button>
            <button class="btn btn-outline-primary rounded-pill px-4 btn-filtro" data-filtro="Capoeira">Capoeira</button>
            <button class="btn btn-outline-primary rounded-pill px-4 btn-filtro" data-filtro="Outros">Outros</button>
        </div>
        
        <div id="lista-eventos" class="d-flex flex-column gap-3 mb-5">
            <div class="text-center text-muted my-5">
                <div class="spinner-border text-primary mb-2" role="status"></div>
                <p>Buscando eventos...</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
