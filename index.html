<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sara Social </title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg d-flex align-items-center justify-content-center">

    <div class="card login-card shadow-lg p-4 p-md-5 mx-3 mx-md-0">
        
        <div class="text-center mb-4">
            <i class="bi bi-geo-alt-fill text-primary" style="font-size: 3rem;"></i>
            <h2 class="fw-bold mt-2 text-primary">Sara Social</h2>
            <p class="text-muted">Acesse para ver os eventos</p>
        </div>

        <form>
            <div class="form-floating mb-3">
                <input type="email" class="form-control rounded-3" id="floatingInput" placeholder="nome@exemplo.com">
                <label for="floatingInput">E-mail</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control rounded-3" id="floatingPassword" placeholder="Senha">
                <label for="floatingPassword">Senha</label>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="lembrarMim">
                    <label class="form-check-label text-muted" for="lembrarMim" style="font-size: 0.9rem;">
                        Lembrar de mim
                    </label>
                </div>
                <a href="#!" class="text-decoration-none" style="font-size: 0.9rem;">Esqueceu a senha?</a>
            </div>

            <button class="btn btn-primary w-100 py-2 rounded-pill fw-bold mb-3 shadow-sm" type="submit" id="btn-login">
                 Entrar
            </button>

            <div class="d-flex align-items-center divider my-3 text-muted" style="font-size: 0.9rem;">
                <span class="mx-3">OU</span>
            </div>

            <button class="btn btn-whatsapp w-100 py-2 rounded-pill fw-bold d-flex align-items-center justify-content-center gap-2 shadow-sm" type="button" onclick="window.location.href='home.html'">
                <i class="bi bi-whatsapp fs-5"></i> Entrar com WhatsApp
            </button>
        </form>
        
        <div class="text-center mt-4">
            <p class="text-muted mb-0" style="font-size: 0.9rem;">Não tem uma conta? <a href="#!" class="text-decoration-none fw-bold">Cadastre-se</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="login.js"></script>
</body>
</html>
