<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bem-vindo - Conecta Bairro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="entrada.css">
</head>
<body>

    <div class="app-container">
        
        <div class="text-center mt-4">
            <i class="bi bi-geo-alt-fill text-primary" style="font-size: 2.5rem;"></i>
            <h2 class="fw-bold text-primary mt-1">Conecta Bairro</h2>
        </div>

        <img src="https://illustrations.popsy.co/amber/community-work.svg" alt="Pessoas no bairro" class="ilustracao">

        <div class="text-area mb-4">
            <h3 class="fw-bold text-dark">Descubra o que rola<br>no seu bairro</h3>
            <p class="text-muted mt-2">Esportes, cultura e lazer pertinho de você. Conecte-se com a sua comunidade!</p>
        </div>

        <div class="mt-auto mb-4">
            <button class="btn btn-whatsapp w-100 py-3 rounded-pill fw-bold d-flex justify-content-center align-items-center gap-2 mb-3 shadow-sm">
                <i class="bi bi-whatsapp fs-5"></i> Entrar com WhatsApp
            </button>
            
            <a href="login.html" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm">
                Criar Minha Conta / Entrar
            </a>
        </div>

    </div>
