<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — Conecta Bairro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .auth-card {
            background: #fff;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 2.3rem;
            max-width: 420px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--brand-500), var(--accent-500));
        }
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 1.7rem;
        }
        .auth-logo .mark {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
            font-size: 1.35rem;
        }
        .auth-logo .name {
            font-family: var(--font-display);
            font-size: 1.35rem;
            font-weight: 600;
        }
        .auth-title {
            text-align: center;
            margin-bottom: 1.7rem;
        }
        .auth-title h2 { margin-bottom: 0.3rem; }
        .auth-title p  { color: var(--ink-500); margin: 0; font-size: 0.95rem; }
        .auth-hint {
            background: var(--brand-50);
            color: var(--brand-800);
            padding: 0.7rem 0.9rem;
            border-radius: var(--radius-md);
            font-size: 0.82rem;
            margin-bottom: 1.2rem;
            border: 1px dashed var(--brand-300);
        }
        .auth-hint code {
            background: rgba(13, 148, 136, 0.1);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85em;
        }
        .auth-link {
            text-align: center;
            margin-top: 1.3rem;
            font-size: 0.92rem;
            color: var(--ink-500);
        }
        .auth-link a {
            color: var(--brand-700);
            font-weight: 600;
            text-decoration: none;
        }
        .voltar-home {
            position: absolute;
            top: 1.2rem;
            left: 1.2rem;
            color: var(--ink-500);
            text-decoration: none;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .voltar-home:hover { color: var(--brand-700); }
    </style>
</head>
<body>
    <a href="/" class="voltar-home"><i class="bi bi-arrow-left"></i> Voltar</a>

    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="mark"><i class="bi bi-geo-alt-fill"></i></div>
                <div class="name">Conecta Bairro</div>
            </div>

            <div class="auth-title">
                <h2>Bem-vindo de volta</h2>
                <p>Entre para ver os eventos do seu bairro</p>
            </div>

            <div class="auth-hint">
                <strong>Quer testar como admin?</strong> Use <code>admin@conectabairro.com</code> / <code>admin123</code>
            </div>

            <form id="form-login">
                <div class="field">
                    <label for="email">E-mail</label>
                    <input id="email" type="email" placeholder="seu@email.com" required autofocus>
                </div>
                <div class="field">
                    <label for="senha">Senha</label>
                    <input id="senha" type="password" placeholder="••••••••" required minlength="6">
                </div>

                <button type="submit" class="btn-cb btn-cb--primary btn-cb--lg btn-cb--block" id="btn-entrar">
                    <span class="label">Entrar</span>
                </button>
            </form>

            <div class="auth-link">
                Não tem conta? <a href="/cadastro">Cadastre-se</a>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/ui.js"></script>
    <script>
        // Se já logado, manda pra área certa
        if (API.isAuthenticated()) {
            const u = API.getUser();
            window.location.href = (u && u.role === 'admin') ? '/admin' : '/app';
        }

        const form = document.getElementById('form-login');
        const btn = document.getElementById('btn-entrar');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            btn.disabled = true;
            btn.querySelector('.label').textContent = 'Entrando...';

            try {
                const dados = await API.post('/auth/login', { email, senha });
                API.setToken(dados.access_token);
                API.setUser(dados.usuario);
                toast(`Olá, ${dados.usuario.nome.split(' ')[0]}!`, 'success', 1500);
                setTimeout(() => {
                    window.location.href = dados.usuario.role === 'admin' ? '/admin' : '/app';
                }, 700);
            } catch (err) {
                toast(err.message || 'Não foi possível entrar', 'error');
                btn.disabled = false;
                btn.querySelector('.label').textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
