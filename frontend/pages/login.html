<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d9488">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <title>Entrar — Conecta Bairro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <a href="/" class="voltar-home"><i class="bi bi-arrow-left"></i> Voltar</a>

    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="mark"><i class="bi bi-geo-alt-fill"></i></div>
                <div class="name">Conecta Bairro</div>
            </div>

            <div class="auth-title">
                <h2>Bem-vindo de volta</h2>
                <p>Entre para ver os eventos do seu bairro</p>
            </div>

            <form id="form-login">
                <div class="field">
                    <label for="email">E-mail</label>
                    <input id="email" type="email" placeholder="seu@email.com" required autofocus>
                </div>
                <div class="field">
                    <label for="senha" class="label-row">
                        Senha
                        <a href="/redefinir-senha">Esqueci minha senha</a>
                    </label>
                    <input id="senha" type="password" placeholder="••••••••" required minlength="6">
                </div>

                <button type="submit" class="btn-cb btn-cb--primary btn-cb--lg btn-cb--block" id="btn-entrar">
                    <span class="label">Entrar</span>
                </button>
            </form>

            <div class="auth-link">
                Não tem conta? <a href="/cadastro">Cadastre-se</a>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/ui.js"></script>
    <script>
        if (API.isAuthenticated()) {
            const u = API.getUser();
            window.location.href = (u && u.role === 'admin') ? '/admin' : '/app';
        }

        const form = document.getElementById('form-login');
        const btn  = document.getElementById('btn-entrar');

        form.addEventListener('submit', async e => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            btn.disabled = true;
            btn.querySelector('.label').textContent = 'Entrando...';
            try {
                const dados = await API.post('/auth/login', { email, senha });
                API.setToken(dados.access_token);
                API.setUser(dados.usuario);
                toast(`Olá, ${dados.usuario.nome.split(' ')[0]}!`, 'success', 1500);
                setTimeout(() => {
                    window.location.href = dados.usuario.role === 'admin' ? '/admin' : '/app';
                }, 700);
            } catch (err) {
                toast(err.message || 'Não foi possível entrar', 'error');
                btn.disabled = false;
                btn.querySelector('.label').textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
