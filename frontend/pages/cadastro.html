<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Conecta Bairro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .auth-card {
            background: #fff;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 2.3rem;
            max-width: 460px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--accent-500), var(--brand-500));
        }
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .auth-logo .mark {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
            font-size: 1.35rem;
        }
        .auth-logo .name {
            font-family: var(--font-display);
            font-size: 1.35rem;
            font-weight: 600;
        }
        .auth-title { text-align: center; margin-bottom: 1.5rem; }
        .auth-title h2 { margin-bottom: 0.3rem; }
        .auth-title p  { color: var(--ink-500); margin: 0; font-size: 0.92rem; }
        .row-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
        @media (max-width: 480px) { .row-fields { grid-template-columns: 1fr; } }
        .auth-link {
            text-align: center;
            margin-top: 1.3rem;
            font-size: 0.92rem;
            color: var(--ink-500);
        }
        .auth-link a { color: var(--brand-700); font-weight: 600; text-decoration: none; }
        .voltar-home {
            position: absolute;
            top: 1.2rem;
            left: 1.2rem;
            color: var(--ink-500);
            text-decoration: none;
            font-size: 0.88rem;
            display: flex; align-items: center; gap: 0.3rem;
        }
        .voltar-home:hover { color: var(--brand-700); }
    </style>
</head>
<body>
    <a href="/" class="voltar-home"><i class="bi bi-arrow-left"></i> Voltar</a>

    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="mark"><i class="bi bi-geo-alt-fill"></i></div>
                <div class="name">Conecta Bairro</div>
            </div>

            <div class="auth-title">
                <h2>Faça parte da comunidade</h2>
                <p>É grátis e leva menos de um minuto</p>
            </div>

            <form id="form-cadastro">
                <div class="field">
                    <label for="nome">Nome completo</label>
                    <input id="nome" type="text" placeholder="Ex: Maria Silva" required minlength="2">
                </div>
                <div class="field">
                    <label for="email">E-mail</label>
                    <input id="email" type="email" placeholder="seu@email.com" required>
                </div>
                <div class="row-fields">
                    <div class="field">
                        <label for="bairro">Bairro</label>
                        <input id="bairro" type="text" placeholder="Sol Nascente">
                    </div>
                    <div class="field">
                        <label for="telefone">WhatsApp</label>
                        <input id="telefone" type="tel" placeholder="(61) 9 0000-0000">
                    </div>
                </div>
                <div class="field">
                    <label for="senha">Crie uma senha</label>
                    <input id="senha" type="password" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>

                <button type="submit" class="btn-cb btn-cb--primary btn-cb--lg btn-cb--block" id="btn-criar">
                    <span class="label">Criar minha conta</span>
                </button>
            </form>

            <div class="auth-link">
                Já tem conta? <a href="/login">Entrar</a>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/ui.js"></script>
    <script>
        if (API.isAuthenticated()) {
            const u = API.getUser();
            window.location.href = (u && u.role === 'admin') ? '/admin' : '/app';
        }

        const form = document.getElementById('form-cadastro');
        const btn = document.getElementById('btn-criar');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome     = document.getElementById('nome').value.trim();
            const email    = document.getElementById('email').value.trim();
            const bairro   = document.getElementById('bairro').value.trim() || null;
            const telefone = document.getElementById('telefone').value.trim() || null;
            const senha    = document.getElementById('senha').value;

            btn.disabled = true;
            btn.querySelector('.label').textContent = 'Criando...';

            try {
                // 1. Cria o usuário
                await API.post('/auth/registro', { nome, email, bairro, telefone, senha });

                // 2. Loga automaticamente
                const login = await API.post('/auth/login', { email, senha });
                API.setToken(login.access_token);
                API.setUser(login.usuario);

                toast('Conta criada! Bem-vindo(a)!', 'success', 1800);
                setTimeout(() => window.location.href = '/app', 800);
            } catch (err) {
                toast(err.message || 'Erro ao criar conta', 'error');
                btn.disabled = false;
                btn.querySelector('.label').textContent = 'Criar minha conta';
            }
        });
    </script>
</body>
</html>
