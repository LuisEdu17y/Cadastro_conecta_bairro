<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos — Conecta Bairro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <main class="app-mobile">
        <!-- Cabeçalho com avatar e saudação -->
        <header class="greet-header">
            <div class="avatar" id="user-avatar">M</div>
            <div class="info">
                <p class="hello" id="hello-text">Olá,</p>
                <p class="name" id="user-name">Carregando...</p>
            </div>
            <button class="logout-btn" id="btn-sair" title="Sair">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </header>

        <!-- Hero estatísticas -->
        <section class="hero-card">
            <h2>O bairro tá fervendo!</h2>
            <p>Confira o que está acontecendo e participe.</p>
            <div class="stats">
                <div>
                    <div class="big" id="stat-total">—</div>
                    <div class="lbl">Eventos</div>
                </div>
                <div>
                    <div class="big" id="stat-inscrito">—</div>
                    <div class="lbl">Inscritos</div>
                </div>
            </div>
        </section>

        <!-- Abas -->
        <div class="chip-row" id="aba-row">
            <button class="chip is-active" data-aba="todos">Todos</button>
            <button class="chip" data-aba="meus">
                <i class="bi bi-bookmark-heart"></i> Meus eventos
            </button>
        </div>

        <!-- Filtros por modalidade -->
        <div class="chip-row" id="filtro-row">
            <button class="chip is-active" data-filtro="Todos">Todas categorias</button>
            <button class="chip" data-filtro="Futebol"><i class="bi bi-trophy"></i> Futebol</button>
            <button class="chip" data-filtro="Zumba"><i class="bi bi-music-note-beamed"></i> Zumba</button>
            <button class="chip" data-filtro="Capoeira"><i class="bi bi-person-arms-up"></i> Capoeira</button>
            <button class="chip" data-filtro="Outros"><i class="bi bi-stars"></i> Outros</button>
        </div>

        <!-- Busca + ordenação -->
        <div style="padding: 0 1rem; display:flex; gap:0.5rem; align-items:center;">
            <div style="flex:1;position:relative;">
                <i class="bi bi-search" style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--ink-400);pointer-events:none;"></i>
                <input id="campo-busca" type="search" placeholder="Buscar eventos..."
                    style="width:100%;padding:0.55rem 0.75rem 0.55rem 2.2rem;border:1.5px solid var(--ink-200);border-radius:99px;font-size:0.9rem;background:#fff;box-sizing:border-box;">
            </div>
            <select id="select-ordem"
                style="padding:0.55rem 0.7rem;border:1.5px solid var(--ink-200);border-radius:99px;font-size:0.85rem;background:#fff;cursor:pointer;">
                <option value="recentes">Mais recentes</option>
                <option value="antigos">Mais antigos</option>
                <option value="inscritos">Mais inscritos</option>
                <option value="vagas">Mais vagas</option>
            </select>
        </div>

        <!-- Filtros avançados (expansível) -->
        <div style="padding: 0 1rem;">
            <button id="btn-filtros-avancados" class="btn-cb btn-cb--soft btn-cb--sm" style="width:100%;justify-content:space-between;display:flex;align-items:center;">
                <span><i class="bi bi-sliders"></i> Filtros avançados</span>
                <i class="bi bi-chevron-down" id="ic-filtros"></i>
            </button>
            <div id="painel-filtros" style="display:none;background:#fff;border-radius:12px;padding:1rem;margin-top:0.5rem;box-shadow:0 2px 8px rgba(0,0,0,.06);">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-bottom:0.7rem;">
                    <div class="field" style="margin:0;">
                        <label style="font-size:0.8rem;">Data inicial</label>
                        <input id="f-data-inicio" type="date" style="padding:0.4rem 0.6rem;font-size:0.85rem;">
                    </div>
                    <div class="field" style="margin:0;">
                        <label style="font-size:0.8rem;">Data final</label>
                        <input id="f-data-fim" type="date" style="padding:0.4rem 0.6rem;font-size:0.85rem;">
                    </div>
                </div>
                <div class="field" style="margin:0 0 0.7rem;">
                    <label style="font-size:0.8rem;">Bairro do evento</label>
                    <input id="f-bairro" type="text" placeholder="Ex: Centro, Asa Norte..." style="padding:0.4rem 0.6rem;font-size:0.85rem;">
                </div>
                <div class="field" style="margin:0 0 0.7rem;">
                    <label style="font-size:0.8rem;">Local / espaço</label>
                    <input id="f-local" type="text" placeholder="Ex: Quadra, Praça..." style="padding:0.4rem 0.6rem;font-size:0.85rem;">
                </div>
                <div style="display:flex;gap:0.5rem;">
                    <button id="btn-aplicar-filtros" class="btn-cb btn-cb--primary btn-cb--sm" style="flex:1;">Aplicar</button>
                    <button id="btn-limpar-filtros" class="btn-cb btn-cb--soft btn-cb--sm" style="flex:1;">Limpar</button>
                </div>
            </div>
        </div>

        <!-- Lista -->
        <section id="feed">
            <div class="cb-spinner"></div>
        </section>
    </main>

    <!-- Navegação inferior -->
    <nav class="bottom-nav">
        <button class="bottom-nav__item is-active" data-aba="todos">
            <i class="bi bi-house-door-fill"></i>
            Início
        </button>
        <button class="bottom-nav__item" data-aba="meus">
            <i class="bi bi-bookmark-heart"></i>
            Meus
        </button>
        <button class="bottom-nav__item" id="btn-perfil">
            <i class="bi bi-person"></i>
            Perfil
        </button>
    </nav>

    <script src="/static/js/api.js?v=2"></script>
    <script src="/static/js/ui.js?v=2"></script>
    <script>
        // ------------------------------------------------------------
        // Guarda: precisa estar logado (qualquer role)
        // ------------------------------------------------------------
        const usuario = exigirLogin('qualquer');
        if (!usuario) {
            // exigirLogin já redireciona; abortamos
            throw new Error('not authenticated');
        }

        // ------------------------------------------------------------
        // Configuração inicial do header
        // ------------------------------------------------------------
        const primeiroNome = usuario.nome.split(' ')[0];
        document.getElementById('user-avatar').textContent = iniciais(usuario.nome);
        document.getElementById('user-name').textContent = primeiroNome;
        const hora = new Date().getHours();
        const saudacao = hora < 12 ? 'Bom dia,' : hora < 18 ? 'Boa tarde,' : 'Boa noite,';
        document.getElementById('hello-text').textContent = saudacao;

        // ------------------------------------------------------------
        // Estado em memória
        // ------------------------------------------------------------
        let aba = 'todos';              // 'todos' ou 'meus'
        let filtro = 'Todos';           // modalidade
        let ordem = 'recentes';         // recentes | antigos | inscritos | vagas
        let buscaTexto = '';            // campo de busca livre
        let cacheTodos = { total: 0, tem_mais: false, eventos: [] };
        let cacheMeus  = [];            // GET /eventos/meus (sem paginação)
        let filtrosAvancados = {};      // { data_inicio, data_fim, bairro, local }
        let offsetAtual = 0;
        const LIMITE = 12;

        // ------------------------------------------------------------
        // Filtros avançados — toggle e lógica
        // ------------------------------------------------------------
        document.getElementById('btn-filtros-avancados').addEventListener('click', () => {
            const painel = document.getElementById('painel-filtros');
            const ic = document.getElementById('ic-filtros');
            const aberto = painel.style.display !== 'none';
            painel.style.display = aberto ? 'none' : 'block';
            ic.className = aberto ? 'bi bi-chevron-down' : 'bi bi-chevron-up';
        });

        document.getElementById('btn-aplicar-filtros').addEventListener('click', () => {
            filtrosAvancados = {};
            const di = document.getElementById('f-data-inicio').value;
            const df = document.getElementById('f-data-fim').value;
            const b  = document.getElementById('f-bairro').value.trim();
            const l  = document.getElementById('f-local').value.trim();
            if (di) filtrosAvancados.data_inicio = di;
            if (df) filtrosAvancados.data_fim = df;
            if (b)  filtrosAvancados.bairro = b;
            if (l)  filtrosAvancados.local = l;
            carregarFeed();
        });

        document.getElementById('btn-limpar-filtros').addEventListener('click', () => {
            filtrosAvancados = {};
            document.getElementById('f-data-inicio').value = '';
            document.getElementById('f-data-fim').value = '';
            document.getElementById('f-bairro').value = '';
            document.getElementById('f-local').value = '';
            carregarFeed();
        });

        // Busca por texto (debounce de 400ms)
        let _buscaTimer = null;
        document.getElementById('campo-busca').addEventListener('input', (e) => {
            clearTimeout(_buscaTimer);
            _buscaTimer = setTimeout(() => {
                buscaTexto = e.target.value.trim();
                carregarFeed();
            }, 400);
        });

        // Ordenação
        document.getElementById('select-ordem').addEventListener('change', (e) => {
            ordem = e.target.value;
            carregarFeed();
        });

        // ------------------------------------------------------------
        // Helpers de query string
        // ------------------------------------------------------------
        function buildParams(offset = 0) {
            const params = new URLSearchParams();
            if (filtro !== 'Todos') params.set('modalidade', filtro);
            if (buscaTexto) params.set('q', buscaTexto);
            if (ordem !== 'recentes') params.set('ordem', ordem);
            Object.entries(filtrosAvancados).forEach(([k, v]) => params.set(k, v));
            params.set('limite', LIMITE);
            params.set('offset', offset);
            return params.toString();
        }

        // ------------------------------------------------------------
        // Carregar dados (primeira página — reseta o feed)
        // ------------------------------------------------------------
        async function carregarFeed() {
            offsetAtual = 0;
            const feed = document.getElementById('feed');
            feed.innerHTML = '<div class="cb-spinner"></div>';

            try {
                if (aba === 'todos') {
                    cacheTodos = await API.get(`/eventos?${buildParams(0)}`);
                } else {
                    cacheMeus = await API.get('/eventos/meus');
                }
                atualizarStats();
                renderizarFeed(false);
            } catch (err) {
                if (err.status === 401) { sair(true); return; }
                feed.innerHTML = `
                    <div class="empty-state">
                        <div class="ic"><i class="bi bi-wifi-off"></i></div>
                        <h4>Não foi possível conectar</h4>
                        <p class="text-muted-soft">${err.message}</p>
                    </div>
                `;
            }
        }

        // Carrega a próxima página e ACRESCENTA ao feed
        async function carregarMais() {
            const btn = document.getElementById('btn-carregar-mais');
            if (btn) { btn.disabled = true; btn.textContent = 'Carregando...'; }

            offsetAtual += LIMITE;
            try {
                const pagina = await API.get(`/eventos?${buildParams(offsetAtual)}`);
                cacheTodos.eventos.push(...pagina.eventos);
                cacheTodos.tem_mais = pagina.tem_mais;
                cacheTodos.total = pagina.total;
                renderizarFeed(true);
            } catch (err) {
                offsetAtual -= LIMITE; // reverte
                toast('Erro ao carregar mais eventos', 'error');
                if (btn) { btn.disabled = false; btn.textContent = 'Carregar mais'; }
            }
        }

        function atualizarStats() {
            const total = aba === 'todos' ? cacheTodos.total : cacheMeus.length;
            document.getElementById('stat-total').textContent = total;
            const inscritos = aba === 'todos'
                ? cacheTodos.eventos.filter(e => e.inscrito).length
                : cacheMeus.length;
            document.getElementById('stat-inscrito').textContent = inscritos;
        }

        function renderizarFeed(append = false) {
            const feed = document.getElementById('feed');

            if (aba === 'todos') {
                let lista = cacheTodos.eventos;
                if (lista.length === 0) { feed.innerHTML = renderVazio(); return; }

                if (append) {
                    // Remove botão antigo antes de adicionar novos cards + botão novo
                    document.getElementById('btn-carregar-mais')?.remove();
                } else {
                    feed.innerHTML = '';
                }

                feed.insertAdjacentHTML('beforeend', lista.slice(append ? lista.length - LIMITE : 0).map(renderCard).join(''));

                // Botão "Carregar mais"
                document.getElementById('btn-carregar-mais')?.remove();
                if (cacheTodos.tem_mais) {
                    feed.insertAdjacentHTML('beforeend', `
                        <div style="text-align:center;padding:1rem 0 0.5rem;">
                            <button id="btn-carregar-mais" class="btn-cb btn-cb--soft"
                                    onclick="carregarMais()" style="min-width:160px;">
                                <i class="bi bi-arrow-down-circle"></i> Carregar mais
                            </button>
                        </div>
                    `);
                }
            } else {
                // Aba "meus" — sem paginação
                let lista = cacheMeus;
                if (filtro !== 'Todos') lista = lista.filter(e => e.modalidade === filtro);
                if (lista.length === 0) { feed.innerHTML = renderVazio(); return; }
                feed.classList.add('stagger');
                feed.innerHTML = lista.map(renderCard).join('');
            }
        }

        function renderVazio() {
            if (aba === 'meus') {
                return `
                    <div class="empty-state">
                        <div class="ic"><i class="bi bi-bookmark"></i></div>
                        <h4>Você ainda não está inscrito em nada</h4>
                        <p>Volte para "Início" e confirme presença nos eventos que te interessam.</p>
                    </div>
                `;
            }
            return `
                <div class="empty-state">
                    <div class="ic"><i class="bi bi-calendar-x"></i></div>
                    <h4>Nenhum evento nessa categoria</h4>
                    <p>Tente filtrar por outra modalidade.</p>
                </div>
            `;
        }

        function renderCard(ev) {
            const cls =
                ev.modalidade === 'Zumba'    ? 'event-card--zumba'    :
                ev.modalidade === 'Capoeira' ? 'event-card--capoeira' :
                ev.modalidade === 'Outros'   ? 'event-card--outros'   : '';

            const catBadge =
                ev.modalidade === 'Futebol'  ? 'badge-cat--futebol'   :
                ev.modalidade === 'Zumba'    ? 'badge-cat--zumba'     :
                ev.modalidade === 'Capoeira' ? 'badge-cat--capoeira'  : 'badge-cat--outros';

            const ic =
                ev.modalidade === 'Futebol'  ? 'bi-trophy'             :
                ev.modalidade === 'Zumba'    ? 'bi-music-note-beamed'  :
                ev.modalidade === 'Capoeira' ? 'bi-person-arms-up'     : 'bi-stars';

            const cheio = ev.vagas > 0 && ev.total_inscritos >= ev.vagas;
            const vagasTxt = ev.vagas > 0
                ? `${ev.total_inscritos}/${ev.vagas} vagas`
                : `${ev.total_inscritos} confirmados`;

            const acaoBtn = ev.inscrito
                ? `<button class="btn-cb btn-cb--sm btn-inscricao is-inscrito" onclick="cancelarInscricao(${ev.id})">
                       <i class="bi bi-check2-circle"></i> Inscrito
                   </button>`
                : (cheio
                    ? `<button class="btn-cb btn-cb--sm btn-cb--soft" disabled>Esgotado</button>`
                    : `<button class="btn-cb btn-cb--sm btn-cb--primary btn-inscricao" onclick="inscrever(${ev.id})">
                           Participar
                       </button>`);

            const descricao = ev.descricao
                ? `<p style="font-size: 0.86rem; color: var(--ink-500); margin: 0.4rem 0 0.6rem;">${escapeHTML(ev.descricao)}</p>`
                : '';

            const imagemBanner = ev.imagem_url
                ? `<div style="margin:-0 -0 0.8rem;border-radius:10px;overflow:hidden;max-height:160px;">
                       <img src="${ev.imagem_url}" alt="Imagem do evento" loading="lazy"
                            style="width:100%;height:160px;object-fit:cover;display:block;">
                   </div>`
                : '';

            const bairroInfo = ev.bairro
                ? `<div class="row"><i class="bi bi-map"></i> ${escapeHTML(ev.bairro)}</div>`
                : '';

            return `
                <article class="event-card ${cls}">
                    ${imagemBanner}
                    <span class="badge-cat ${catBadge}">
                        <i class="bi ${ic}"></i> ${ev.modalidade}
                    </span>
                    <h3>${escapeHTML(ev.titulo)}</h3>
                    ${descricao}
                    <div class="meta">
                        <div class="row"><i class="bi bi-calendar-event"></i> ${escapeHTML(ev.data)}</div>
                        <div class="row"><i class="bi bi-geo-alt"></i> ${escapeHTML(ev.local)}</div>
                        ${bairroInfo}
                    </div>
                    <div class="footer-row">
                        <span class="vagas-info ${cheio ? 'is-cheio' : ''}">
                            <i class="bi bi-people"></i> ${vagasTxt}
                        </span>
                        <div style="display:flex;gap:0.4rem;align-items:center;">
                            <button class="btn-cb btn-cb--sm btn-cb--ghost" title="Comentários" onclick="abrirComentarios(${ev.id}, '${escapeHTML(ev.titulo).replace(/'/g,"\\'")}')">
                                <i class="bi bi-chat"></i>
                            </button>
                            <button class="btn-cb btn-cb--sm btn-cb--ghost" title="Compartilhar" onclick="compartilharEvento(${ev.id}, '${escapeHTML(ev.titulo).replace(/'/g,"\\'")}', '${escapeHTML(ev.local).replace(/'/g,"\\'")}', '${escapeHTML(ev.data).replace(/'/g,"\\'")}')">
                                <i class="bi bi-share"></i>
                            </button>
                            ${acaoBtn}
                        </div>
                    </div>
                </article>
            `;
        }

        function escapeHTML(s) {
            if (s == null) return '';
            return String(s)
                .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;').replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        // ------------------------------------------------------------
        // Ações
        // ------------------------------------------------------------
        window.inscrever = async function(id) {
            try {
                await API.post(`/eventos/${id}/inscrever`);
                toast('Presença confirmada!', 'success');
                await carregarFeed();
            } catch (err) {
                toast(err.message || 'Erro ao inscrever', 'error');
            }
        };

        window.cancelarInscricao = async function(id) {
            const ok = await confirmar({
                titulo: 'Cancelar inscrição?',
                mensagem: 'Você não estará mais confirmado neste evento.',
                textoOk: 'Sim, cancelar',
                textoCancelar: 'Manter',
                perigoso: true,
            });
            if (!ok) return;
            try {
                await API.delete(`/eventos/${id}/inscrever`);
                toast('Inscrição cancelada', 'info');
                await carregarFeed();
            } catch (err) {
                toast(err.message || 'Erro', 'error');
            }
        };

        // ------------------------------------------------------------
        // Eventos de UI: filtros e abas
        // ------------------------------------------------------------
        document.querySelectorAll('#filtro-row .chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('#filtro-row .chip').forEach(c => c.classList.remove('is-active'));
                chip.classList.add('is-active');
                filtro = chip.dataset.filtro;
                carregarFeed(); // sempre busca do zero ao mudar filtro
            });
        });

        function trocarAba(novaAba) {
            aba = novaAba;
            // Chip no topo
            document.querySelectorAll('#aba-row .chip').forEach(c => {
                c.classList.toggle('is-active', c.dataset.aba === aba);
            });
            // Nav inferior
            document.querySelectorAll('.bottom-nav__item').forEach(b => {
                if (b.dataset.aba) b.classList.toggle('is-active', b.dataset.aba === aba);
            });
            carregarFeed();
        }

        document.querySelectorAll('#aba-row .chip').forEach(c => {
            c.addEventListener('click', () => trocarAba(c.dataset.aba));
        });
        document.querySelectorAll('.bottom-nav__item[data-aba]').forEach(b => {
            b.addEventListener('click', () => trocarAba(b.dataset.aba));
        });

        // Sair
        document.getElementById('btn-sair').addEventListener('click', async () => {
            const ok = await confirmar({
                titulo: 'Sair da conta?',
                mensagem: 'Você vai precisar fazer login novamente.',
                textoOk: 'Sair',
                textoCancelar: 'Ficar',
            });
            if (ok) sair();
        });

        // Perfil — modal com visualização e edição
        document.getElementById('btn-perfil').addEventListener('click', () => abrirPerfil());

        function abrirPerfil(editando = false) {
            const bd = document.createElement('div');
            bd.className = 'cb-modal-backdrop';

            if (!editando) {
                bd.innerHTML = `
                    <div class="cb-modal">
                        <div class="text-center mb-2">
                            <div class="avatar" style="margin:0 auto 0.8rem;width:72px;height:72px;font-size:1.6rem;">
                                ${iniciais(usuario.nome)}
                            </div>
                            <h3 style="margin-bottom:0.2rem;">${escapeHTML(usuario.nome)}</h3>
                            <p class="text-muted-soft" style="margin:0;">${escapeHTML(usuario.email)}</p>
                            ${usuario.role === 'admin' ? '<span class="status-pill status-pill--admin mt-1">Administrador</span>' : ''}
                        </div>
                        <div style="margin-top:1.2rem;font-size:0.9rem;color:var(--ink-700);">
                            <p><strong>Bairro:</strong> ${escapeHTML(usuario.bairro || '—')}</p>
                            <p><strong>Telefone:</strong> ${escapeHTML(usuario.telefone || '—')}</p>
                        </div>
                        <button class="btn-cb btn-cb--primary btn-cb--block mt-2" id="btn-editar-perfil">
                            <i class="bi bi-pencil"></i> Editar perfil
                        </button>
                        ${usuario.role === 'admin'
                            ? '<a href="/admin" class="btn-cb btn-cb--soft btn-cb--block mt-1"><i class="bi bi-shield-lock"></i> Painel admin</a>'
                            : ''}
                        <button class="btn-cb btn-cb--ghost btn-cb--block mt-1" data-close>Fechar</button>
                    </div>
                `;
                document.body.appendChild(bd);
                bd.querySelector('#btn-editar-perfil').addEventListener('click', () => {
                    bd.remove();
                    abrirPerfil(true);
                });
            } else {
                bd.innerHTML = `
                    <div class="cb-modal">
                        <h3>Editar perfil</h3>
                        <form id="form-perfil">
                            <div class="field">
                                <label>Nome</label>
                                <input id="p-nome" value="${escapeHTML(usuario.nome)}" required>
                            </div>
                            <div class="field">
                                <label>Bairro</label>
                                <input id="p-bairro" placeholder="Seu bairro" value="${escapeHTML(usuario.bairro || '')}">
                            </div>
                            <div class="field">
                                <label>Telefone</label>
                                <input id="p-telefone" placeholder="(00) 00000-0000" value="${escapeHTML(usuario.telefone || '')}">
                            </div>
                            <div class="field">
                                <label>Nova senha <span class="text-muted-soft" style="font-weight:400;">(deixe em branco para manter)</span></label>
                                <input id="p-senha" type="password" placeholder="Mínimo 6 caracteres" minlength="6">
                            </div>
                            <div class="flex gap-2 mt-2">
                                <button type="button" class="btn-cb btn-cb--soft btn-cb--block" data-close>Cancelar</button>
                                <button type="submit" class="btn-cb btn-cb--primary btn-cb--block" id="btn-salvar-perfil">
                                    Salvar
                                </button>
                            </div>
                        </form>
                    </div>
                `;
                document.body.appendChild(bd);

                bd.querySelector('#form-perfil').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const payload = {};
                    const nome = bd.querySelector('#p-nome').value.trim();
                    const bairro = bd.querySelector('#p-bairro').value.trim();
                    const telefone = bd.querySelector('#p-telefone').value.trim();
                    const senha = bd.querySelector('#p-senha').value;

                    if (nome !== usuario.nome) payload.nome = nome;
                    if (bairro !== (usuario.bairro || '')) payload.bairro = bairro || null;
                    if (telefone !== (usuario.telefone || '')) payload.telefone = telefone || null;
                    if (senha) payload.senha = senha;

                    if (Object.keys(payload).length === 0) { bd.remove(); return; }

                    const btn = bd.querySelector('#btn-salvar-perfil');
                    btn.disabled = true;
                    try {
                        const atualizado = await API.put('/auth/me', payload);
                        // Atualiza o usuário em memória e no localStorage
                        Object.assign(usuario, atualizado);
                        API.setUser(atualizado);
                        // Atualiza header
                        document.getElementById('user-avatar').textContent = iniciais(usuario.nome);
                        document.getElementById('user-name').textContent = usuario.nome.split(' ')[0];
                        toast('Perfil atualizado!', 'success');
                        bd.remove();
                    } catch (err) {
                        toast(err.message || 'Erro ao salvar', 'error');
                        btn.disabled = false;
                    }
                });
            }

            bd.addEventListener('click', (e) => {
                if (e.target === bd || e.target.closest('[data-close]')) bd.remove();
            });
        }

        // ------------------------------------------------------------
        // Comentários
        // ------------------------------------------------------------
        window.abrirComentarios = async function(eventoId, tituloEvento) {
            const bd = document.createElement('div');
            bd.className = 'cb-modal-backdrop';
            bd.innerHTML = `
                <div class="cb-modal" style="max-height:85vh;display:flex;flex-direction:column;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                        <h3 style="margin:0;font-size:1.05rem;">💬 ${escapeHTML(tituloEvento)}</h3>
                        <button data-close style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--ink-500);">×</button>
                    </div>
                    <div id="lista-comentarios" style="flex:1;overflow-y:auto;margin-bottom:1rem;">
                        <div class="cb-spinner"></div>
                    </div>
                    ${API.isAuthenticated() ? `
                    <form id="form-comentario" style="display:flex;gap:0.5rem;">
                        <input id="input-comentario" placeholder="Escreva um comentário..." maxlength="500"
                            style="flex:1;padding:0.55rem 0.8rem;border:1.5px solid var(--ink-200);border-radius:99px;font-size:0.9rem;">
                        <button type="submit" class="btn-cb btn-cb--primary btn-cb--sm" style="border-radius:99px;padding:0.55rem 1rem;">
                            <i class="bi bi-send"></i>
                        </button>
                    </form>` : `<p style="text-align:center;color:var(--ink-400);font-size:0.85rem;">
                        <a href="/login">Entre</a> para comentar
                    </p>`}
                </div>
            `;
            document.body.appendChild(bd);
            bd.addEventListener('click', e => { if (e.target === bd || e.target.closest('[data-close]')) bd.remove(); });

            const lista = bd.querySelector('#lista-comentarios');

            async function renderizarComentarios() {
                try {
                    const comentarios = await API.get(`/eventos/${eventoId}/comentarios`);
                    if (comentarios.length === 0) {
                        lista.innerHTML = '<p style="text-align:center;color:var(--ink-400);padding:1.5rem 0;">Nenhum comentário ainda. Seja o primeiro!</p>';
                        return;
                    }
                    lista.innerHTML = comentarios.map(c => `
                        <div style="padding:0.7rem 0;border-bottom:1px solid var(--ink-100);display:flex;gap:0.6rem;align-items:flex-start;">
                            <div style="width:32px;height:32px;border-radius:50%;background:var(--brand-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;">
                                ${escapeHTML(c.usuario_nome.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase())}
                            </div>
                            <div style="flex:1;min-width:0;">
                                <div style="display:flex;justify-content:space-between;align-items:center;gap:0.5rem;">
                                    <strong style="font-size:0.85rem;">${escapeHTML(c.usuario_nome)}</strong>
                                    <span style="font-size:0.75rem;color:var(--ink-400);white-space:nowrap;">
                                        ${new Date(c.criado_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
                                    </span>
                                </div>
                                <p style="margin:0.2rem 0 0;font-size:0.9rem;color:var(--ink-700);word-break:break-word;">${escapeHTML(c.texto)}</p>
                            </div>
                            ${c.pode_deletar ? `<button onclick="deletarComentario(${c.id}, this)" style="background:none;border:none;color:var(--ink-300);cursor:pointer;padding:0.2rem;flex-shrink:0;" title="Remover">
                                <i class="bi bi-trash3" style="font-size:0.8rem;"></i>
                            </button>` : ''}
                        </div>
                    `).join('');
                } catch {
                    lista.innerHTML = '<p style="text-align:center;color:var(--ink-400);">Erro ao carregar comentários.</p>';
                }
            }

            await renderizarComentarios();

            const form = bd.querySelector('#form-comentario');
            if (form) {
                form.addEventListener('submit', async e => {
                    e.preventDefault();
                    const input = bd.querySelector('#input-comentario');
                    const texto = input.value.trim();
                    if (!texto) return;
                    try {
                        await API.post(`/eventos/${eventoId}/comentarios`, { texto });
                        input.value = '';
                        await renderizarComentarios();
                        lista.scrollTop = lista.scrollHeight;
                    } catch (err) {
                        toast(err.message || 'Erro ao comentar', 'error');
                    }
                });
            }
        };

        window.deletarComentario = async function(id, btn) {
            try {
                await API.delete(`/comentarios/${id}`);
                btn.closest('div[style]').remove();
            } catch (err) {
                toast(err.message || 'Erro ao remover', 'error');
            }
        };

        // ------------------------------------------------------------
        // Compartilhar evento
        // ------------------------------------------------------------
        window.compartilharEvento = function(id, titulo, local, data) {
            const texto = `${titulo}\n📍 ${local}\n📅 ${data}`;
            const url = window.location.origin + '/app';
            if (navigator.share) {
                navigator.share({ title: titulo, text: texto, url });
            } else {
                navigator.clipboard.writeText(`${texto}\n${url}`)
                    .then(() => toast('Link copiado!', 'success'))
                    .catch(() => toast('Não foi possível copiar', 'error'));
            }
        };

        // ------------------------------------------------------------
        // Boot
        // ------------------------------------------------------------
        window.carregarMais = carregarMais; // expõe para o onclick inline

        carregarFeed();
    </script>
</body>
</html>
