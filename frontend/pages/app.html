<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d9488">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <title>Eventos — Conecta Bairro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <main class="app-mobile">
        <!-- Cabeçalho com avatar e saudação -->
        <header class="greet-header">
            <div class="avatar" id="user-avatar">M</div>
            <div class="info">
                <p class="hello" id="hello-text">Olá,</p>
                <p class="name" id="user-name">Carregando...</p>
            </div>
            <button class="logout-btn" id="btn-sair" title="Sair">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </header>

        <!-- Hero estatísticas -->
        <section class="hero-card">
            <h2>O bairro tá fervendo!</h2>
            <p>Confira o que está acontecendo e participe.</p>
            <div class="stats">
                <div>
                    <div class="big" id="stat-total">—</div>
                    <div class="lbl">Eventos</div>
                </div>
                <div>
                    <div class="big" id="stat-inscrito">—</div>
                    <div class="lbl">Inscritos</div>
                </div>
            </div>
        </section>

        <!-- Abas -->
        <div class="chip-row" id="aba-row">
            <button class="chip is-active" data-aba="todos">Todos</button>
            <button class="chip" data-aba="meus">
                <i class="bi bi-bookmark-heart"></i> Meus eventos
            </button>
        </div>

        <!-- Filtros por modalidade -->
        <div class="chip-row" id="filtro-row">
            <button class="chip is-active" data-filtro="Todos">Todas categorias</button>
            <button class="chip" data-filtro="Futebol"><i class="bi bi-trophy"></i> Futebol</button>
            <button class="chip" data-filtro="Zumba"><i class="bi bi-music-note-beamed"></i> Zumba</button>
            <button class="chip" data-filtro="Capoeira"><i class="bi bi-person-arms-up"></i> Capoeira</button>
            <button class="chip" data-filtro="Outros"><i class="bi bi-stars"></i> Outros</button>
        </div>

        <!-- Busca + ordenação -->
        <div class="search-bar-row">
            <div class="search-input-wrap">
                <i class="bi bi-search search-icon"></i>
                <input id="campo-busca" type="search" placeholder="Buscar eventos...">
            </div>
            <select id="select-ordem">
                <option value="recentes">Mais recentes</option>
                <option value="antigos">Mais antigos</option>
                <option value="inscritos">Mais inscritos</option>
                <option value="vagas">Mais vagas</option>
            </select>
        </div>

        <!-- Botão geolocalização -->
        <div class="geo-bar">
            <button id="btn-geo" class="btn-cb btn-cb--soft btn-cb--sm geo-btn" onclick="toggleGeo()">
                <i class="bi bi-geo-alt"></i> Próximos de mim
            </button>
            <span id="geo-status" class="geo-status"></span>
        </div>

        <!-- Filtros avançados (expansível) -->
        <div class="filtros-wrap">
            <button id="btn-filtros-avancados" class="btn-cb btn-cb--soft btn-cb--sm">
                <span><i class="bi bi-sliders"></i> Filtros avançados</span>
                <i class="bi bi-chevron-down" id="ic-filtros"></i>
            </button>
            <div id="painel-filtros">
                <div class="filtros-grid">
                    <div class="field">
                        <label>Data inicial</label>
                        <input id="f-data-inicio" type="date">
                    </div>
                    <div class="field">
                        <label>Data final</label>
                        <input id="f-data-fim" type="date">
                    </div>
                </div>
                <div class="field">
                    <label>Bairro do evento</label>
                    <input id="f-bairro" type="text" placeholder="Ex: Centro, Asa Norte...">
                </div>
                <div class="field">
                    <label>Local / espaço</label>
                    <input id="f-local" type="text" placeholder="Ex: Quadra, Praça...">
                </div>
                <div class="filtros-actions">
                    <button id="btn-aplicar-filtros" class="btn-cb btn-cb--primary btn-cb--sm">Aplicar</button>
                    <button id="btn-limpar-filtros" class="btn-cb btn-cb--soft btn-cb--sm">Limpar</button>
                </div>
            </div>
        </div>

        <!-- Lista -->
        <section id="feed">
            <div class="cb-spinner"></div>
        </section>
    </main>

    <!-- Navegação inferior -->
    <nav class="bottom-nav">
        <button class="bottom-nav__item is-active" data-aba="todos">
            <i class="bi bi-house-door-fill"></i>
            Início
        </button>
        <button class="bottom-nav__item" data-aba="meus">
            <i class="bi bi-bookmark-heart"></i>
            Meus
        </button>
        <button class="bottom-nav__item" id="btn-perfil">
            <i class="bi bi-person"></i>
            Perfil
        </button>
    </nav>

    <script src="/static/js/api.js?v=2"></script>
    <script src="/static/js/ui.js?v=2"></script>
    <script>
        // ------------------------------------------------------------
        // Guarda: precisa estar logado (qualquer role)
        // ------------------------------------------------------------
        const usuario = exigirLogin('qualquer');
        if (!usuario) throw new Error('not authenticated');

        // ------------------------------------------------------------
        // Configuração inicial do header
        // ------------------------------------------------------------
        function atualizarAvatar(el, u) {
            if (u.foto_url) {
                el.innerHTML = `<img src="${u.foto_url}" alt="${u.nome}" class="avatar-img">`;
                el.classList.add('has-foto');
            } else {
                el.textContent = iniciais(u.nome);
                el.classList.remove('has-foto');
            }
        }
        atualizarAvatar(document.getElementById('user-avatar'), usuario);
        document.getElementById('user-name').textContent = usuario.nome.split(' ')[0];
        const hora = new Date().getHours();
        document.getElementById('hello-text').textContent =
            hora < 12 ? 'Bom dia,' : hora < 18 ? 'Boa tarde,' : 'Boa noite,';

        // ------------------------------------------------------------
        // Estado em memória
        // ------------------------------------------------------------
        let aba = 'todos';
        let filtro = 'Todos';
        let ordem = 'recentes';
        let buscaTexto = '';
        let cacheTodos = { total: 0, tem_mais: false, eventos: [] };
        let cacheMeus  = [];
        let filtrosAvancados = {};
        let offsetAtual = 0;
        const LIMITE = 12;
        let geoCoords = null; // { lat, lon } quando ativo

        // ------------------------------------------------------------
        // Filtros avançados — toggle
        // ------------------------------------------------------------
        document.getElementById('btn-filtros-avancados').addEventListener('click', () => {
            const painel = document.getElementById('painel-filtros');
            const ic = document.getElementById('ic-filtros');
            const aberto = painel.style.display !== 'none';
            painel.style.display = aberto ? 'none' : 'block';
            ic.className = aberto ? 'bi bi-chevron-down' : 'bi bi-chevron-up';
        });

        document.getElementById('btn-aplicar-filtros').addEventListener('click', () => {
            filtrosAvancados = {};
            const di = document.getElementById('f-data-inicio').value;
            const df = document.getElementById('f-data-fim').value;
            const b  = document.getElementById('f-bairro').value.trim();
            const l  = document.getElementById('f-local').value.trim();
            if (di) filtrosAvancados.data_inicio = di;
            if (df) filtrosAvancados.data_fim = df;
            if (b)  filtrosAvancados.bairro = b;
            if (l)  filtrosAvancados.local = l;
            carregarFeed();
        });

        document.getElementById('btn-limpar-filtros').addEventListener('click', () => {
            filtrosAvancados = {};
            ['f-data-inicio','f-data-fim','f-bairro','f-local'].forEach(id => {
                document.getElementById(id).value = '';
            });
            carregarFeed();
        });

        // Busca (debounce 400ms)
        let _buscaTimer = null;
        document.getElementById('campo-busca').addEventListener('input', e => {
            clearTimeout(_buscaTimer);
            _buscaTimer = setTimeout(() => { buscaTexto = e.target.value.trim(); carregarFeed(); }, 400);
        });

        // Ordenação
        document.getElementById('select-ordem').addEventListener('change', e => {
            ordem = e.target.value;
            carregarFeed();
        });

        // ------------------------------------------------------------
        // Query string
        // ------------------------------------------------------------
        function buildParams(offset = 0) {
            const p = new URLSearchParams();
            if (filtro !== 'Todos') p.set('modalidade', filtro);
            if (buscaTexto) p.set('q', buscaTexto);
            if (ordem !== 'recentes') p.set('ordem', ordem);
            Object.entries(filtrosAvancados).forEach(([k, v]) => p.set(k, v));
            if (geoCoords) {
                p.set('lat', geoCoords.lat);
                p.set('lon', geoCoords.lon);
                p.set('raio_km', '20');
            }
            p.set('limite', LIMITE);
            p.set('offset', offset);
            return p.toString();
        }

        // ------------------------------------------------------------
        // Geolocalização
        // ------------------------------------------------------------
        async function toggleGeo() {
            const btn = document.getElementById('btn-geo');
            const status = document.getElementById('geo-status');
            if (geoCoords) {
                geoCoords = null;
                btn.classList.remove('is-active');
                btn.innerHTML = '<i class="bi bi-geo-alt"></i> Próximos de mim';
                status.textContent = '';
                carregarFeed();
                return;
            }
            if (!navigator.geolocation) {
                toast('Seu navegador não suporta geolocalização', 'error');
                return;
            }
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat spin-icon"></i> Localizando...';
            status.textContent = '';
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    geoCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    btn.disabled = false;
                    btn.classList.add('is-active');
                    btn.innerHTML = '<i class="bi bi-geo-alt-fill"></i> Próximos de mim';
                    status.textContent = 'Mostrando eventos em até 20 km';
                    carregarFeed();
                },
                (err) => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-geo-alt"></i> Próximos de mim';
                    const msgs = {
                        1: 'Permissão de localização negada',
                        2: 'Localização indisponível',
                        3: 'Tempo esgotado',
                    };
                    toast(msgs[err.code] || 'Erro ao obter localização', 'error');
                },
                { timeout: 10000, maximumAge: 60000 }
            );
        }

        // ------------------------------------------------------------
        // Skeleton loading
        // ------------------------------------------------------------
        function renderSkeleton(n = 4) {
            return Array.from({ length: n }, () => `
                <div class="skeleton-card">
                    <div class="skeleton skeleton-line skeleton-line--sm mb-1"></div>
                    <div class="skeleton skeleton-line skeleton-line--title"></div>
                    <div class="skeleton skeleton-line skeleton-line--lg"></div>
                    <div class="skeleton skeleton-line skeleton-line--md mb-2"></div>
                    <div class="skeleton skeleton-line skeleton-line--md"></div>
                    <div class="skeleton-footer">
                        <div class="skeleton skeleton-line" style="width:90px;height:10px;"></div>
                        <div class="skeleton skeleton-btn"></div>
                    </div>
                </div>
            `).join('');
        }

        // ------------------------------------------------------------
        // Carregar dados (primeira página)
        // ------------------------------------------------------------
        async function carregarFeed() {
            offsetAtual = 0;
            const feed = document.getElementById('feed');
            feed.innerHTML = renderSkeleton(4);

            try {
                if (aba === 'todos') {
                    cacheTodos = await API.get(`/eventos?${buildParams(0)}`);
                } else {
                    cacheMeus = await API.get('/eventos/meus');
                }
                atualizarStats();
                renderizarFeed(false);
            } catch (err) {
                if (err.status === 401) { sair(true); return; }
                feed.innerHTML = `
                    <div class="empty-state">
                        <div class="ic"><i class="bi bi-wifi-off"></i></div>
                        <h4>Não foi possível conectar</h4>
                        <p class="text-muted-soft">${err.message}</p>
                    </div>
                `;
            }
        }

        async function carregarMais() {
            const btn = document.getElementById('btn-carregar-mais');
            if (btn) { btn.disabled = true; btn.textContent = 'Carregando...'; }
            offsetAtual += LIMITE;
            try {
                const pagina = await API.get(`/eventos?${buildParams(offsetAtual)}`);
                cacheTodos.eventos.push(...pagina.eventos);
                cacheTodos.tem_mais = pagina.tem_mais;
                cacheTodos.total = pagina.total;
                renderizarFeed(true);
            } catch (err) {
                offsetAtual -= LIMITE;
                toast('Erro ao carregar mais eventos', 'error');
                if (btn) { btn.disabled = false; btn.textContent = 'Carregar mais'; }
            }
        }

        function atualizarStats() {
            const total = aba === 'todos' ? cacheTodos.total : cacheMeus.length;
            document.getElementById('stat-total').textContent = total;
            const inscritos = aba === 'todos'
                ? cacheTodos.eventos.filter(e => e.inscrito).length
                : cacheMeus.length;
            document.getElementById('stat-inscrito').textContent = inscritos;
        }

        function renderizarFeed(append = false) {
            const feed = document.getElementById('feed');

            if (aba === 'todos') {
                let lista = cacheTodos.eventos;
                if (lista.length === 0) { feed.innerHTML = renderVazio(); return; }

                if (append) {
                    document.getElementById('btn-carregar-mais')?.remove();
                } else {
                    feed.innerHTML = '';
                }

                feed.insertAdjacentHTML('beforeend', lista.slice(append ? lista.length - LIMITE : 0).map(renderCard).join(''));

                document.getElementById('btn-carregar-mais')?.remove();
                if (cacheTodos.tem_mais) {
                    feed.insertAdjacentHTML('beforeend', `
                        <div class="carregar-mais-wrap">
                            <button id="btn-carregar-mais" class="btn-cb btn-cb--soft" onclick="carregarMais()">
                                <i class="bi bi-arrow-down-circle"></i> Carregar mais
                            </button>
                        </div>
                    `);
                }
            } else {
                let lista = cacheMeus;
                if (filtro !== 'Todos') lista = lista.filter(e => e.modalidade === filtro);
                if (lista.length === 0) { feed.innerHTML = renderVazio(); return; }
                feed.classList.add('stagger');
                feed.innerHTML = lista.map(renderCard).join('');
            }
        }

        function renderVazio() {
            if (aba === 'meus') return `
                <div class="empty-state">
                    <div class="ic"><i class="bi bi-bookmark"></i></div>
                    <h4>Você ainda não está inscrito em nada</h4>
                    <p>Volte para "Início" e confirme presença nos eventos que te interessam.</p>
                </div>`;
            return `
                <div class="empty-state">
                    <div class="ic"><i class="bi bi-calendar-x"></i></div>
                    <h4>Nenhum evento nessa categoria</h4>
                    <p>Tente filtrar por outra modalidade.</p>
                </div>`;
        }

        function renderCard(ev) {
            const modCls = {
                Zumba: 'event-card--zumba', Capoeira: 'event-card--capoeira', Outros: 'event-card--outros'
            }[ev.modalidade] || '';

            const badgeCls = {
                Futebol: 'badge-cat--futebol', Zumba: 'badge-cat--zumba',
                Capoeira: 'badge-cat--capoeira'
            }[ev.modalidade] || 'badge-cat--outros';

            const ic = {
                Futebol: 'bi-trophy', Zumba: 'bi-music-note-beamed',
                Capoeira: 'bi-person-arms-up'
            }[ev.modalidade] || 'bi-stars';

            const cheio = ev.vagas > 0 && ev.total_inscritos >= ev.vagas;
            const vagasTxt = ev.vagas > 0
                ? `${ev.total_inscritos}/${ev.vagas} vagas`
                : `${ev.total_inscritos} confirmados`;

            // Barra de progresso de vagas
            let vagasBar = '';
            if (ev.vagas > 0) {
                const pct = Math.min((ev.total_inscritos / ev.vagas) * 100, 100);
                const fillCls = pct >= 90 ? 'vagas-bar-fill--danger' : pct >= 60 ? 'vagas-bar-fill--warn' : '';
                vagasBar = `<div class="vagas-bar"><div class="vagas-bar-fill ${fillCls}" style="width:${pct}%"></div></div>`;
            }

            const acaoBtn = ev.inscrito
                ? `<button class="btn-cb btn-cb--sm btn-inscricao is-inscrito" onclick="cancelarInscricao(${ev.id})">
                       <i class="bi bi-check2-circle"></i> Inscrito
                   </button>`
                : ev.posicao_espera > 0
                ? `<button class="btn-cb btn-cb--sm btn-cb--soft is-espera" onclick="sairDaEspera(${ev.id})" title="Clique para sair da fila">
                       <i class="bi bi-hourglass-split"></i> Fila #${ev.posicao_espera}
                   </button>`
                : cheio
                ? `<button class="btn-cb btn-cb--sm btn-cb--soft" onclick="entrarNaEspera(${ev.id})">
                       <i class="bi bi-list-check"></i> Entrar na fila
                   </button>`
                : `<button class="btn-cb btn-cb--sm btn-cb--primary btn-inscricao" onclick="inscrever(${ev.id})">
                       Participar
                   </button>`;

            const descricao = ev.descricao
                ? `<p class="event-card-desc">${escapeHTML(ev.descricao)}</p>`
                : '';

            const banner = ev.imagem_url
                ? `<div class="event-card-image"><img src="${ev.imagem_url}" alt="Imagem do evento" loading="lazy"></div>`
                : `<div class="event-card-banner event-card-banner--${ev.modalidade.toLowerCase()}"><i class="bi ${ic}"></i></div>`;

            const bairroInfo = ev.bairro
                ? `<div class="row"><i class="bi bi-map"></i> ${escapeHTML(ev.bairro)}</div>`
                : '';

            const distanciaInfo = ev.distancia_km != null
                ? `<div class="row distancia-row"><i class="bi bi-compass"></i> <span class="badge-distancia">${ev.distancia_km} km de você</span></div>`
                : '';

            const tituloEsc = escapeHTML(ev.titulo).replace(/'/g, "\\'");
            const localEsc  = escapeHTML(ev.local).replace(/'/g, "\\'");
            const dataEsc   = escapeHTML(ev.data).replace(/'/g, "\\'");

            return `
                <article class="event-card ${modCls}">
                    ${banner}
                    <span class="badge-cat ${badgeCls}"><i class="bi ${ic}"></i> ${ev.modalidade}</span>
                    <h3>${escapeHTML(ev.titulo)}</h3>
                    ${descricao}
                    <div class="meta">
                        <div class="row"><i class="bi bi-calendar-event"></i> ${escapeHTML(ev.data)}</div>
                        <div class="row"><i class="bi bi-geo-alt"></i> ${escapeHTML(ev.local)}</div>
                        ${bairroInfo}
                        ${distanciaInfo}
                    </div>
                    <div class="footer-row">
                        <div>
                            <span class="vagas-info ${cheio ? 'is-cheio' : ''}">
                                <i class="bi bi-people"></i> ${vagasTxt}
                            </span>
                            ${vagasBar}
                        </div>
                        <div class="event-card-actions">
                            <button class="btn-cb btn-cb--sm btn-cb--ghost" title="Comentários"
                                onclick="abrirComentarios(${ev.id}, '${tituloEsc}')">
                                <i class="bi bi-chat"></i>
                            </button>
                            <button class="btn-cb btn-cb--sm btn-cb--ghost" title="Avaliar"
                                onclick="abrirAvaliacoes(${ev.id}, '${tituloEsc}')">
                                <i class="bi bi-star${ev.nota_media ? '-fill' : ''}"></i>
                                ${ev.nota_media ? `<span style="font-size:.7rem">${ev.nota_media}</span>` : ''}
                            </button>
                            <button class="btn-cb btn-cb--sm btn-cb--ghost" title="Compartilhar"
                                onclick="compartilharEvento(${ev.id}, '${tituloEsc}', '${localEsc}', '${dataEsc}')">
                                <i class="bi bi-share"></i>
                            </button>
                            ${acaoBtn}
                        </div>
                    </div>
                </article>
            `;
        }

        function escapeHTML(s) {
            if (s == null) return '';
            return String(s)
                .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;').replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        // ------------------------------------------------------------
        // Ações
        // ------------------------------------------------------------
        window.inscrever = async function(id) {
            try {
                const res = await API.post(`/eventos/${id}/inscrever`);
                toast(res.lista_espera ? res.mensagem : 'Presença confirmada!', res.lista_espera ? 'info' : 'success');
                await carregarFeed();
            } catch (err) {
                toast(err.message || 'Erro ao inscrever', 'error');
            }
        };

        window.entrarNaEspera = async function(id) {
            try {
                const res = await API.post(`/eventos/${id}/inscrever`);
                toast(res.mensagem, 'info');
                await carregarFeed();
            } catch (err) {
                toast(err.message || 'Erro', 'error');
            }
        };

        window.sairDaEspera = async function(id) {
            const ok = await confirmar({
                titulo: 'Sair da lista de espera?',
                mensagem: 'Você perderá sua posição na fila.',
                textoOk: 'Sim, sair',
                textoCancelar: 'Manter',
                perigoso: true,
            });
            if (!ok) return;
            try {
                await API.delete(`/eventos/${id}/espera`);
                toast('Removido da lista de espera', 'info');
                await carregarFeed();
            } catch (err) {
                toast(err.message || 'Erro', 'error');
            }
        };

        window.cancelarInscricao = async function(id) {
            const ok = await confirmar({
                titulo: 'Cancelar inscrição?',
                mensagem: 'Você não estará mais confirmado neste evento.',
                textoOk: 'Sim, cancelar',
                textoCancelar: 'Manter',
                perigoso: true,
            });
            if (!ok) return;
            try {
                await API.delete(`/eventos/${id}/inscrever`);
                toast('Inscrição cancelada', 'info');
                await carregarFeed();
            } catch (err) {
                toast(err.message || 'Erro', 'error');
            }
        };

        // ------------------------------------------------------------
        // Filtros e abas
        // ------------------------------------------------------------
        document.querySelectorAll('#filtro-row .chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('#filtro-row .chip').forEach(c => c.classList.remove('is-active'));
                chip.classList.add('is-active');
                filtro = chip.dataset.filtro;
                carregarFeed();
            });
        });

        function trocarAba(novaAba) {
            aba = novaAba;
            document.querySelectorAll('#aba-row .chip').forEach(c =>
                c.classList.toggle('is-active', c.dataset.aba === aba));
            document.querySelectorAll('.bottom-nav__item').forEach(b => {
                if (b.dataset.aba) b.classList.toggle('is-active', b.dataset.aba === aba);
            });
            carregarFeed();
        }

        document.querySelectorAll('#aba-row .chip').forEach(c =>
            c.addEventListener('click', () => trocarAba(c.dataset.aba)));
        document.querySelectorAll('.bottom-nav__item[data-aba]').forEach(b =>
            b.addEventListener('click', () => trocarAba(b.dataset.aba)));

        document.getElementById('btn-sair').addEventListener('click', async () => {
            const ok = await confirmar({
                titulo: 'Sair da conta?',
                mensagem: 'Você vai precisar fazer login novamente.',
                textoOk: 'Sair',
                textoCancelar: 'Ficar',
            });
            if (ok) sair();
        });

        // ------------------------------------------------------------
        // Perfil
        // ------------------------------------------------------------
        document.getElementById('btn-perfil').addEventListener('click', () => abrirPerfil());

        function abrirPerfil(editando = false) {
            const bd = document.createElement('div');
            bd.className = 'cb-modal-backdrop';

            if (!editando) {
                const avatarHtml = usuario.foto_url
                    ? `<div class="avatar perfil-avatar-lg has-foto"><img src="${usuario.foto_url}" alt="${escapeHTML(usuario.nome)}" class="avatar-img"></div>`
                    : `<div class="avatar perfil-avatar-lg">${iniciais(usuario.nome)}</div>`;

                bd.innerHTML = `
                    <div class="cb-modal">
                        <div class="text-center mb-2">
                            ${avatarHtml}
                            <h3>${escapeHTML(usuario.nome)}</h3>
                            <p class="text-muted-soft">${escapeHTML(usuario.email)}</p>
                            ${usuario.role === 'admin' ? '<span class="status-pill status-pill--admin mt-1">Administrador</span>' : ''}
                            ${usuario.precisa_cesta_basica ? '<span class="status-pill status-pill--cesta mt-1"><i class="bi bi-box-seam"></i> Cesta básica solicitada</span>' : ''}
                        </div>
                        <div class="perfil-dados">
                            <p><strong>Bairro:</strong> ${escapeHTML(usuario.bairro || '—')}</p>
                            <p><strong>Telefone:</strong> ${escapeHTML(usuario.telefone || '—')}</p>
                        </div>
                        <button class="btn-cb btn-cb--primary btn-cb--block mt-2" id="btn-editar-perfil">
                            <i class="bi bi-pencil"></i> Editar perfil
                        </button>
                        ${usuario.role === 'admin'
                            ? '<a href="/admin" class="btn-cb btn-cb--soft btn-cb--block mt-1"><i class="bi bi-shield-lock"></i> Painel admin</a>'
                            : ''}
                        <button class="btn-cb btn-cb--ghost btn-cb--block mt-1" data-close>Fechar</button>
                    </div>
                `;
                bd.querySelector('#btn-editar-perfil').addEventListener('click', () => {
                    bd.remove(); abrirPerfil(true);
                });
            } else {
                const fotoAtual = usuario.foto_url
                    ? `<div class="avatar perfil-avatar-lg has-foto"><img src="${usuario.foto_url}" alt="" class="avatar-img" id="preview-foto"></div>`
                    : `<div class="avatar perfil-avatar-lg" id="preview-foto-wrap">${iniciais(usuario.nome)}</div>`;

                bd.innerHTML = `
                    <div class="cb-modal">
                        <h3>Editar perfil</h3>
                        <form id="form-perfil">
                            <div class="foto-upload-wrap text-center mb-2">
                                ${fotoAtual}
                                <label class="btn-cb btn-cb--soft btn-cb--sm mt-1" style="cursor:pointer;display:inline-flex;">
                                    <i class="bi bi-camera"></i> Alterar foto
                                    <input id="p-foto" type="file" accept=".jpg,.jpeg,.png,.webp" style="display:none">
                                </label>
                            </div>
                            <div class="field">
                                <label>Nome</label>
                                <input id="p-nome" value="${escapeHTML(usuario.nome)}" required>
                            </div>
                            <div class="field">
                                <label>Bairro</label>
                                <input id="p-bairro" placeholder="Seu bairro" value="${escapeHTML(usuario.bairro || '')}">
                            </div>
                            <div class="field">
                                <label>Telefone</label>
                                <input id="p-telefone" placeholder="(00) 00000-0000" value="${escapeHTML(usuario.telefone || '')}">
                            </div>
                            <div class="field">
                                <label>Nova senha <span class="senha-hint">(deixe em branco para manter)</span></label>
                                <input id="p-senha" type="password" placeholder="Mínimo 6 caracteres" minlength="6">
                            </div>
                            <label class="cesta-label mt-1">
                                <input id="p-cesta" type="checkbox" ${usuario.precisa_cesta_basica ? 'checked' : ''}>
                                <span><i class="bi bi-box-seam"></i> Preciso de cesta básica</span>
                            </label>
                            <div class="flex gap-2 mt-2">
                                <button type="button" class="btn-cb btn-cb--soft btn-cb--block" data-close>Cancelar</button>
                                <button type="submit" class="btn-cb btn-cb--primary btn-cb--block" id="btn-salvar-perfil">Salvar</button>
                            </div>
                        </form>
                    </div>
                `;
                // Preview da foto antes de salvar
                bd.querySelector('#p-foto').addEventListener('change', e => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => {
                        const wrap = bd.querySelector('#preview-foto-wrap') || bd.querySelector('#preview-foto')?.parentElement;
                        const existingImg = bd.querySelector('#preview-foto');
                        if (existingImg) {
                            existingImg.src = ev.target.result;
                        } else if (wrap) {
                            wrap.innerHTML = `<img src="${ev.target.result}" alt="" class="avatar-img" id="preview-foto">`;
                            wrap.classList.add('has-foto');
                        }
                    };
                    reader.readAsDataURL(file);
                });

                bd.querySelector('#form-perfil').addEventListener('submit', async e => {
                    e.preventDefault();
                    const btn = bd.querySelector('#btn-salvar-perfil');
                    btn.disabled = true;
                    btn.textContent = 'Salvando...';

                    try {
                        // Upload de foto (se selecionada)
                        const fotoInput = bd.querySelector('#p-foto');
                        if (fotoInput.files[0]) {
                            const fd = new FormData();
                            fd.append('arquivo', fotoInput.files[0]);
                            const atualizado = await API.postForm('/auth/me/foto', fd);
                            Object.assign(usuario, atualizado);
                            API.setUser(atualizado);
                        }

                        // Atualizar dados do perfil
                        const payload = {};
                        const nome     = bd.querySelector('#p-nome').value.trim();
                        const bairro   = bd.querySelector('#p-bairro').value.trim();
                        const telefone = bd.querySelector('#p-telefone').value.trim();
                        const senha    = bd.querySelector('#p-senha').value;
                        const cesta    = bd.querySelector('#p-cesta').checked;

                        if (nome !== usuario.nome) payload.nome = nome;
                        if (bairro !== (usuario.bairro || '')) payload.bairro = bairro || null;
                        if (telefone !== (usuario.telefone || '')) payload.telefone = telefone || null;
                        if (senha) payload.senha = senha;
                        if (cesta !== usuario.precisa_cesta_basica) payload.precisa_cesta_basica = cesta;

                        if (Object.keys(payload).length > 0) {
                            const atualizado = await API.put('/auth/me', payload);
                            Object.assign(usuario, atualizado);
                            API.setUser(atualizado);
                        }

                        atualizarAvatar(document.getElementById('user-avatar'), usuario);
                        document.getElementById('user-name').textContent = usuario.nome.split(' ')[0];
                        toast('Perfil atualizado!', 'success');
                        bd.remove();
                    } catch (err) {
                        toast(err.message || 'Erro ao salvar', 'error');
                        btn.disabled = false;
                        btn.textContent = 'Salvar';
                    }
                });
            }

            document.body.appendChild(bd);
            bd.addEventListener('click', e => {
                if (e.target === bd || e.target.closest('[data-close]')) bd.remove();
            });
        }

        // ------------------------------------------------------------
        // Comentários
        // ------------------------------------------------------------
        window.abrirComentarios = async function(eventoId, tituloEvento) {
            const bd = document.createElement('div');
            bd.className = 'cb-modal-backdrop';
            bd.innerHTML = `
                <div class="cb-modal comentarios-modal">
                    <div class="comentarios-header">
                        <h3>💬 ${escapeHTML(tituloEvento)}</h3>
                        <button class="comentarios-close" data-close>×</button>
                    </div>
                    <div id="lista-comentarios" class="comentarios-lista">
                        ${Array.from({length:3}, () => `
                            <div class="skel-comentario">
                                <div class="skeleton skel-avatar"></div>
                                <div class="skel-body">
                                    <div class="skeleton skeleton-line" style="width:40%;height:10px;margin-bottom:6px;"></div>
                                    <div class="skeleton skeleton-line skeleton-line--full" style="height:10px;"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ${API.isAuthenticated()
                        ? `<form id="form-comentario" class="comentarios-form">
                               <input id="input-comentario" class="comentarios-input" placeholder="Escreva um comentário..." maxlength="500">
                               <button type="submit" class="btn-cb btn-cb--primary btn-cb--sm">
                                   <i class="bi bi-send"></i>
                               </button>
                           </form>`
                        : `<p class="comentarios-login"><a href="/login">Entre</a> para comentar</p>`}
                </div>
            `;
            document.body.appendChild(bd);
            bd.addEventListener('click', e => {
                if (e.target === bd || e.target.closest('[data-close]')) bd.remove();
            });

            const lista = bd.querySelector('#lista-comentarios');

            async function renderizarComentarios() {
                try {
                    const comentarios = await API.get(`/eventos/${eventoId}/comentarios`);
                    if (comentarios.length === 0) {
                        lista.innerHTML = '<p class="comentarios-empty">Nenhum comentário ainda. Seja o primeiro!</p>';
                        return;
                    }
                    lista.innerHTML = comentarios.map(c => `
                        <div class="comentario-item">
                            <div class="comentario-avatar">
                                ${escapeHTML(c.usuario_nome.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase())}
                            </div>
                            <div class="comentario-body">
                                <div class="comentario-meta">
                                    <strong class="comentario-autor">${escapeHTML(c.usuario_nome)}</strong>
                                    <span class="comentario-data">
                                        ${new Date(c.criado_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
                                    </span>
                                </div>
                                <p class="comentario-texto">${escapeHTML(c.texto)}</p>
                            </div>
                            ${c.pode_deletar ? `
                                <button class="comentario-del" onclick="deletarComentario(${c.id}, this)" title="Remover">
                                    <i class="bi bi-trash3"></i>
                                </button>` : ''}
                        </div>
                    `).join('');
                } catch {
                    lista.innerHTML = '<p class="comentarios-empty">Erro ao carregar comentários.</p>';
                }
            }

            await renderizarComentarios();

            const form = bd.querySelector('#form-comentario');
            if (form) {
                form.addEventListener('submit', async e => {
                    e.preventDefault();
                    const input = bd.querySelector('#input-comentario');
                    const texto = input.value.trim();
                    if (!texto) return;
                    try {
                        await API.post(`/eventos/${eventoId}/comentarios`, { texto });
                        input.value = '';
                        await renderizarComentarios();
                        lista.scrollTop = lista.scrollHeight;
                    } catch (err) {
                        toast(err.message || 'Erro ao comentar', 'error');
                    }
                });
            }
        };

        window.deletarComentario = async function(id, btn) {
            try {
                await API.delete(`/comentarios/${id}`);
                btn.closest('.comentario-item').remove();
            } catch (err) {
                toast(err.message || 'Erro ao remover', 'error');
            }
        };

        // ------------------------------------------------------------
        // Avaliações
        // ------------------------------------------------------------
        window.abrirAvaliacoes = async function(eventoId, tituloEvento) {
            const bd = document.createElement('div');
            bd.className = 'cb-modal-backdrop';
            bd.innerHTML = `
                <div class="cb-modal comentarios-modal">
                    <div class="comentarios-header">
                        <h3>⭐ ${escapeHTML(tituloEvento)}</h3>
                        <button class="comentarios-close" data-close>×</button>
                    </div>
                    <div id="lista-avaliacoes" class="comentarios-lista">
                        ${Array.from({length:2}, () => `
                            <div class="skel-comentario">
                                <div class="skeleton skel-avatar"></div>
                                <div class="skel-body">
                                    <div class="skeleton skeleton-line" style="width:40%;height:10px;margin-bottom:6px;"></div>
                                    <div class="skeleton skeleton-line skeleton-line--full" style="height:10px;"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ${API.isAuthenticated()
                        ? `<form id="form-avaliacao" class="avaliacoes-form">
                               <div class="estrelas-row" id="estrelas" data-nota="0">
                                   ${[1,2,3,4,5].map(n => `<button type="button" class="estrela" data-nota="${n}">★</button>`).join('')}
                               </div>
                               <div class="avaliacoes-input-row">
                                   <input id="input-avaliacao-comentario" class="comentarios-input" placeholder="Comentário opcional..." maxlength="300">
                                   <button type="submit" class="btn-cb btn-cb--primary btn-cb--sm" id="btn-enviar-avaliacao">
                                       <i class="bi bi-send"></i>
                                   </button>
                               </div>
                           </form>`
                        : `<p class="comentarios-login"><a href="/login">Entre</a> para avaliar</p>`}
                </div>
            `;
            document.body.appendChild(bd);
            bd.addEventListener('click', e => {
                if (e.target === bd || e.target.closest('[data-close]')) bd.remove();
            });

            const lista = bd.querySelector('#lista-avaliacoes');

            async function renderizarAvaliacoes() {
                try {
                    const avaliacoes = await API.get(`/eventos/${eventoId}/avaliacoes`);
                    if (avaliacoes.length === 0) {
                        lista.innerHTML = '<p class="comentarios-empty">Nenhuma avaliação ainda. Seja o primeiro!</p>';
                        return;
                    }
                    lista.innerHTML = avaliacoes.map(a => `
                        <div class="comentario-item avaliacao-item">
                            <div class="comentario-avatar">${escapeHTML(a.usuario_nome.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase())}</div>
                            <div class="comentario-body">
                                <div class="comentario-meta">
                                    <strong class="comentario-autor">${escapeHTML(a.usuario_nome)}</strong>
                                    <span class="estrelas-display">${'★'.repeat(a.nota)}${'☆'.repeat(5 - a.nota)}</span>
                                    <span class="comentario-data">${new Date(a.criado_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</span>
                                </div>
                                ${a.comentario ? `<p class="comentario-texto">${escapeHTML(a.comentario)}</p>` : ''}
                            </div>
                            ${a.pode_deletar ? `
                                <button class="comentario-del" onclick="deletarAvaliacao(${a.id}, this)" title="Remover">
                                    <i class="bi bi-trash3"></i>
                                </button>` : ''}
                        </div>
                    `).join('');
                } catch {
                    lista.innerHTML = '<p class="comentarios-empty">Erro ao carregar avaliações.</p>';
                }
            }

            await renderizarAvaliacoes();

            // Estrelas interativas
            const estrelasRow = bd.querySelector('#estrelas');
            if (estrelasRow) {
                let notaSelecionada = 0;
                estrelasRow.querySelectorAll('.estrela').forEach(btn => {
                    btn.addEventListener('mouseenter', () => {
                        const n = +btn.dataset.nota;
                        estrelasRow.querySelectorAll('.estrela').forEach(b =>
                            b.classList.toggle('ativa', +b.dataset.nota <= n));
                    });
                    btn.addEventListener('mouseleave', () => {
                        estrelasRow.querySelectorAll('.estrela').forEach(b =>
                            b.classList.toggle('ativa', +b.dataset.nota <= notaSelecionada));
                    });
                    btn.addEventListener('click', () => {
                        notaSelecionada = +btn.dataset.nota;
                        estrelasRow.dataset.nota = notaSelecionada;
                        estrelasRow.querySelectorAll('.estrela').forEach(b =>
                            b.classList.toggle('ativa', +b.dataset.nota <= notaSelecionada));
                    });
                });

                bd.querySelector('#form-avaliacao').addEventListener('submit', async e => {
                    e.preventDefault();
                    const nota = +estrelasRow.dataset.nota;
                    if (!nota) { toast('Selecione uma nota de 1 a 5 estrelas', 'error'); return; }
                    const comentario = bd.querySelector('#input-avaliacao-comentario').value.trim() || null;
                    const btn = bd.querySelector('#btn-enviar-avaliacao');
                    btn.disabled = true;
                    try {
                        await API.post(`/eventos/${eventoId}/avaliacoes`, { nota, comentario });
                        bd.querySelector('#input-avaliacao-comentario').value = '';
                        notaSelecionada = 0;
                        estrelasRow.dataset.nota = '0';
                        estrelasRow.querySelectorAll('.estrela').forEach(b => b.classList.remove('ativa'));
                        toast('Avaliação enviada!', 'success');
                        await renderizarAvaliacoes();
                        await carregarFeed();
                    } catch (err) {
                        toast(err.message || 'Erro ao avaliar', 'error');
                    } finally {
                        btn.disabled = false;
                    }
                });
            }
        };

        window.deletarAvaliacao = async function(id, btn) {
            try {
                await API.delete(`/avaliacoes/${id}`);
                btn.closest('.avaliacao-item').remove();
            } catch (err) {
                toast(err.message || 'Erro ao remover', 'error');
            }
        };

        // ------------------------------------------------------------
        // Compartilhar
        // ------------------------------------------------------------
        window.compartilharEvento = function(id, titulo, local, data) {
            const texto = `${titulo}\n📍 ${local}\n📅 ${data}`;
            const url = window.location.origin + '/app';
            if (navigator.share) {
                navigator.share({ title: titulo, text: texto, url });
            } else {
                navigator.clipboard.writeText(`${texto}\n${url}`)
                    .then(() => toast('Link copiado!', 'success'))
                    .catch(() => toast('Não foi possível copiar', 'error'));
            }
        };

        // ------------------------------------------------------------
        // Boot
        // ------------------------------------------------------------
        window.carregarMais = carregarMais;
        carregarFeed();
    </script>
</body>
</html>
