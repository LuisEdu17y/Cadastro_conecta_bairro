<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d9488">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <title>Painel Admin — Conecta Bairro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="admin-body">
    <!-- Topbar mobile (visível só em telas pequenas) -->
    <header class="mobile-topbar">
        <h1><span class="topbar-dot">●</span> Admin</h1>
        <button class="menu-btn" id="btn-menu-mobile"><i class="bi bi-list"></i></button>
    </header>

    <div class="admin-shell">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <h1><span class="dot"></span> Conecta Bairro</h1>
            <nav>
                <button class="nav-link is-active" data-secao="dashboard">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </button>
                <button class="nav-link" data-secao="eventos">
                    <i class="bi bi-calendar-event"></i> Eventos
                </button>
                <button class="nav-link" data-secao="usuarios">
                    <i class="bi bi-people-fill"></i> Usuários
                </button>
                <a href="/app" class="nav-link">
                    <i class="bi bi-eye"></i> Ver como morador
                </a>
                <button class="nav-link sair" id="btn-sair">
                    <i class="bi bi-box-arrow-right"></i> Sair
                </button>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div>
                    <span class="eyebrow" id="secao-eyebrow">Visão geral</span>
                    <h2 id="secao-titulo">Dashboard</h2>
                </div>
                <span class="user-tag">
                    <span class="avatar kpi-avatar-sm" id="admin-avatar">A</span>
                    <span id="admin-nome">Admin</span>
                </span>
            </header>

            <!-- ================ DASHBOARD ================ -->
            <section id="sec-dashboard" class="secao is-active">
                <div class="kpi-grid">
                    <div class="kpi-card" style="--accent-color: var(--brand-200);">
                        <div class="ic" style="background:var(--brand-100);color:var(--brand-700);"><i class="bi bi-people-fill"></i></div>
                        <div class="lbl">Usuários cadastrados</div>
                        <div class="val" id="kpi-usuarios">—</div>
                    </div>
                    <div class="kpi-card" style="--accent-color: #ffedd5;">
                        <div class="ic" style="background:#ffedd5;color:var(--accent-600);"><i class="bi bi-calendar-check-fill"></i></div>
                        <div class="lbl">Eventos ativos</div>
                        <div class="val" id="kpi-eventos">—</div>
                    </div>
                    <div class="kpi-card" style="--accent-color: #fee2e2;">
                        <div class="ic" style="background:#fee2e2;color:#be123c;"><i class="bi bi-bookmark-heart-fill"></i></div>
                        <div class="lbl">Inscrições totais</div>
                        <div class="val" id="kpi-inscricoes">—</div>
                    </div>
                    <div class="kpi-card" style="--accent-color: #e0e7ff;">
                        <div class="ic" style="background:#e0e7ff;color:#4338ca;"><i class="bi bi-shield-lock-fill"></i></div>
                        <div class="lbl">Administradores</div>
                        <div class="val" id="kpi-admins">—</div>
                    </div>
                    <div class="kpi-card" style="--accent-color: #fef3c7;">
                        <div class="ic" style="background:#fef3c7;color:#92400e;"><i class="bi bi-hourglass-split"></i></div>
                        <div class="lbl">Na lista de espera</div>
                        <div class="val" id="kpi-espera">—</div>
                    </div>
                    <div class="kpi-card" style="--accent-color: #d1fae5;">
                        <div class="ic" style="background:#d1fae5;color:#065f46;"><i class="bi bi-star-fill"></i></div>
                        <div class="lbl">Avaliações</div>
                        <div class="val" id="kpi-avaliacoes">—</div>
                    </div>
                </div>

                <div class="cb-card mb-3">
                    <div class="section-title">
                        <h3>Atividade recente</h3>
                    </div>
                    <div id="atividade-recente">
                        <div class="cb-spinner"></div>
                    </div>
                </div>

                <div class="cb-card mb-3">
                    <div class="section-title">
                        <h3>Eventos por categoria</h3>
                    </div>
                    <div class="bar-list" id="grafico-modalidades">
                        <div class="cb-spinner"></div>
                    </div>
                </div>

                <div class="cb-card">
                    <div class="section-title">
                        <h3>Top eventos por inscrições</h3>
                    </div>
                    <div id="top-eventos">
                        <div class="cb-spinner"></div>
                    </div>
                </div>
            </section>

            <!-- ================ EVENTOS ================ -->
            <section id="sec-eventos" class="secao">
                <div class="section-title">
                    <h3>Gerenciar eventos</h3>
                    <button class="btn-cb btn-cb--primary" id="btn-novo-evento">
                        <i class="bi bi-plus-lg"></i> Novo evento
                    </button>
                </div>
                <div id="lista-eventos-admin">
                    <div class="cb-spinner"></div>
                </div>
            </section>

            <!-- ================ USUÁRIOS ================ -->
            <section id="sec-usuarios" class="secao">
                <div class="section-title">
                    <h3>Gerenciar usuários</h3>
                </div>
                <div id="lista-usuarios">
                    <div class="cb-spinner"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/ui.js"></script>
    <script>
        const usuario = exigirLogin('admin');
        if (!usuario) throw new Error('not admin');

        document.getElementById('admin-avatar').textContent = iniciais(usuario.nome);
        document.getElementById('admin-nome').textContent = usuario.nome.split(' ')[0];

        // ----------------------------------------------------------
        // Navegação
        // ----------------------------------------------------------
        const titulos = {
            dashboard: { eyebrow: 'Visão geral',  titulo: 'Dashboard' },
            eventos:   { eyebrow: 'CRUD',          titulo: 'Gerenciar Eventos' },
            usuarios:  { eyebrow: 'Comunidade',    titulo: 'Gerenciar Usuários' },
        };

        function trocarSecao(nome) {
            document.querySelectorAll('.secao').forEach(s => s.classList.remove('is-active'));
            document.getElementById(`sec-${nome}`).classList.add('is-active');
            document.querySelectorAll('.admin-sidebar .nav-link[data-secao]').forEach(n =>
                n.classList.toggle('is-active', n.dataset.secao === nome));
            const t = titulos[nome];
            document.getElementById('secao-eyebrow').textContent = t.eyebrow;
            document.getElementById('secao-titulo').textContent  = t.titulo;
            if (nome === 'dashboard') carregarDashboard();
            if (nome === 'eventos')   carregarEventosAdmin();
            if (nome === 'usuarios')  carregarUsuarios();
        }

        document.querySelectorAll('.admin-sidebar .nav-link[data-secao]').forEach(n =>
            n.addEventListener('click', () => trocarSecao(n.dataset.secao)));

        document.getElementById('btn-menu-mobile')?.addEventListener('click', () => {
            const s = document.getElementById('sidebar');
            const visivel = s.style.display === 'block';
            Object.assign(s.style, visivel
                ? { display: '' }
                : { display: 'block', position: 'fixed', top: '0', left: '0', zIndex: '999', width: '280px' });
        });

        document.getElementById('btn-sair').addEventListener('click', async () => {
            const ok = await confirmar({ titulo: 'Sair?', mensagem: 'Você precisará entrar novamente.', textoOk: 'Sair' });
            if (ok) sair();
        });

        function escapeHTML(s) {
            if (s == null) return '';
            return String(s)
                .replaceAll('&','&amp;').replaceAll('<','&lt;')
                .replaceAll('>','&gt;').replaceAll('"','&quot;')
                .replaceAll("'","&#39;");
        }

        // ==========================================================
        // DASHBOARD
        // ==========================================================
        async function carregarDashboard() {
            try {
                const d = await API.get('/admin/estatisticas');

                document.getElementById('kpi-usuarios').textContent   = d.total_usuarios;
                document.getElementById('kpi-eventos').textContent    = d.total_eventos;
                document.getElementById('kpi-inscricoes').textContent = d.total_inscricoes;
                document.getElementById('kpi-admins').textContent     = d.total_admins;
                document.getElementById('kpi-espera').textContent     = d.total_espera ?? '—';
                document.getElementById('kpi-avaliacoes').textContent = d.total_avaliacoes ?? '—';

                // Atividade recente
                try {
                    const atividade = await API.get('/admin/atividade');
                    const ar = document.getElementById('atividade-recente');
                    if (!atividade.length) {
                        ar.innerHTML = '<p class="text-muted-soft">Nenhuma atividade registrada ainda.</p>';
                    } else {
                        ar.innerHTML = `<ul class="atividade-lista">${atividade.map(a => {
                            const data = new Date(a.criado_em).toLocaleString('pt-BR', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
                            if (a.tipo === 'inscricao') {
                                return `<li class="atividade-item">
                                    <span class="atividade-ic atividade-ic--inscricao"><i class="bi bi-bookmark-heart-fill"></i></span>
                                    <span><strong>${escapeHTML(a.usuario_nome)}</strong> se inscreveu em <strong>${escapeHTML(a.evento_titulo)}</strong></span>
                                    <span class="atividade-data">${data}</span>
                                </li>`;
                            }
                            const estrelas = '★'.repeat(a.nota) + '☆'.repeat(5 - a.nota);
                            return `<li class="atividade-item">
                                <span class="atividade-ic atividade-ic--avaliacao"><i class="bi bi-star-fill"></i></span>
                                <span><strong>${escapeHTML(a.usuario_nome)}</strong> avaliou <strong>${escapeHTML(a.evento_titulo)}</strong> com <span class="estrelas-display">${estrelas}</span></span>
                                <span class="atividade-data">${data}</span>
                            </li>`;
                        }).join('')}</ul>`;
                    }
                } catch { /* atividade não crítica */ }

                const max = Math.max(1, ...d.eventos_por_modalidade.map(m => m.quantidade));
                const gm  = document.getElementById('grafico-modalidades');
                gm.innerHTML = d.eventos_por_modalidade.length === 0
                    ? '<p class="text-muted-soft">Ainda não há eventos cadastrados.</p>'
                    : d.eventos_por_modalidade.map(m => `
                        <div class="bar-item">
                            <div>${escapeHTML(m.modalidade)}</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${(m.quantidade/max)*100}%"></div></div>
                            <div class="num">${m.quantidade}</div>
                        </div>`).join('');

                const te = document.getElementById('top-eventos');
                te.innerHTML = d.top_eventos.length === 0
                    ? '<p class="text-muted-soft">Nenhum evento ainda.</p>'
                    : `<table class="cb-table">
                           <thead><tr><th>Evento</th><th>Categoria</th><th class="text-right">Inscritos</th></tr></thead>
                           <tbody>${d.top_eventos.map(t => `
                               <tr>
                                   <td data-label="Evento" class="text-bold">${escapeHTML(t.titulo)}</td>
                                   <td data-label="Categoria"><span class="badge-cat badge-cat--${t.modalidade.toLowerCase()}">${escapeHTML(t.modalidade)}</span></td>
                                   <td data-label="Inscritos" class="text-right text-bold">${t.total_inscritos}</td>
                               </tr>`).join('')}
                           </tbody>
                       </table>`;
            } catch (err) {
                if (err.status === 401) { sair(true); return; }
                toast('Erro ao carregar estatísticas', 'error');
            }
        }

        // ==========================================================
        // EVENTOS — CRUD
        // ==========================================================
        async function carregarEventosAdmin() {
            const cont = document.getElementById('lista-eventos-admin');
            cont.innerHTML = '<div class="cb-spinner"></div>';
            try {
                const resposta = await API.get('/eventos?limite=100');
                const eventos  = Array.isArray(resposta) ? resposta : (resposta.eventos ?? []);
                if (eventos.length === 0) {
                    cont.innerHTML = `
                        <div class="empty-state cb-card">
                            <div class="ic"><i class="bi bi-calendar-plus"></i></div>
                            <h4>Sem eventos ainda</h4>
                            <p>Clique em "Novo evento" para começar.</p>
                        </div>`;
                    return;
                }
                cont.innerHTML = `
                    <table class="cb-table">
                        <thead>
                            <tr>
                                <th>Título</th><th>Categoria</th><th>Data</th>
                                <th>Local</th><th>Inscritos</th><th class="text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${eventos.map(ev => `
                                <tr>
                                    <td data-label="Título" class="text-bold">${escapeHTML(ev.titulo)}</td>
                                    <td data-label="Categoria">
                                        <span class="badge-cat badge-cat--${ev.modalidade.toLowerCase()}">${escapeHTML(ev.modalidade)}</span>
                                    </td>
                                    <td data-label="Data" class="text-muted-soft">${escapeHTML(ev.data)}</td>
                                    <td data-label="Local" class="text-muted-soft">${escapeHTML(ev.local)}</td>
                                    <td data-label="Inscritos">
                                        <strong>${ev.total_inscritos}</strong>${ev.vagas > 0 ? `<span class="text-muted-soft"> / ${ev.vagas}</span>` : ''}
                                    </td>
                                    <td data-label="Ações" class="text-right">
                                        <button class="btn-cb btn-cb--sm btn-cb--soft" onclick="verInscritos(${ev.id}, '${escapeHTML(ev.titulo).replace(/'/g,"\\'")}')">
                                            <i class="bi bi-people"></i>
                                        </button>
                                        <button class="btn-cb btn-cb--sm btn-cb--ghost" onclick="editarEvento(${ev.id})">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <button class="btn-cb btn-cb--sm btn-cb--danger" onclick="deletarEvento(${ev.id}, '${escapeHTML(ev.titulo).replace(/'/g,"\\'")}')">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </td>
                                </tr>`).join('')}
                        </tbody>
                    </table>`;
            } catch (err) {
                if (err.status === 401) { sair(true); return; }
                toast('Erro ao carregar eventos', 'error');
            }
        }

        function abrirFormEvento(evento = null) {
            const editando = !!evento;
            const bd = document.createElement('div');
            bd.className = 'cb-modal-backdrop';
            bd.innerHTML = `
                <div class="cb-modal">
                    <h3>${editando ? 'Editar evento' : 'Novo evento'}</h3>
                    <form id="form-evento">
                        <div class="field">
                            <label>Título</label>
                            <input id="ev-titulo" required value="${evento ? escapeHTML(evento.titulo) : ''}" placeholder="Ex: Roda de Capoeira">
                        </div>
                        <div class="field">
                            <label>Descrição (opcional)</label>
                            <textarea id="ev-descricao" rows="2" placeholder="Detalhes do evento...">${evento ? escapeHTML(evento.descricao || '') : ''}</textarea>
                        </div>
                        <div class="field-grid">
                            <div class="field">
                                <label>Modalidade</label>
                                <select id="ev-modalidade" required>
                                    <option value="">Escolha...</option>
                                    <option value="Futebol"  ${evento?.modalidade==='Futebol'  ? 'selected':''}>Futebol</option>
                                    <option value="Zumba"    ${evento?.modalidade==='Zumba'    ? 'selected':''}>Zumba</option>
                                    <option value="Capoeira" ${evento?.modalidade==='Capoeira' ? 'selected':''}>Capoeira</option>
                                    <option value="Outros"   ${evento?.modalidade==='Outros'   ? 'selected':''}>Outros</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>Cor de destaque</label>
                                <select id="ev-cor">
                                    <option value="blue"   ${evento?.cor==='blue'   ? 'selected':''}>Verde (padrão)</option>
                                    <option value="orange" ${evento?.cor==='orange' ? 'selected':''}>Laranja</option>
                                    <option value="pink"   ${evento?.cor==='pink'   ? 'selected':''}>Rosa</option>
                                </select>
                            </div>
                        </div>
                        <div class="field-grid">
                            <div class="field">
                                <label>Data (texto exibido)</label>
                                <input id="ev-data" required value="${evento ? escapeHTML(evento.data) : ''}" placeholder="Ex: Sábado, 09:00">
                            </div>
                            <div class="field">
                                <label>Vagas (0 = ilimitadas)</label>
                                <input id="ev-vagas" type="number" min="0" value="${evento ? evento.vagas : 30}">
                            </div>
                        </div>
                        <div class="field-grid">
                            <div class="field">
                                <label>Data/hora real (para filtros)</label>
                                <input id="ev-data-inicio" type="datetime-local"
                                    value="${evento?.data_inicio ? evento.data_inicio.slice(0,16) : ''}">
                            </div>
                            <div class="field">
                                <label>Bairro do evento</label>
                                <input id="ev-bairro" placeholder="Ex: Centro, Asa Norte"
                                    value="${evento ? escapeHTML(evento.bairro || '') : ''}">
                            </div>
                        </div>
                        <div class="field">
                            <label>Local</label>
                            <input id="ev-local" value="${evento ? escapeHTML(evento.local) : 'Quadra Poliesportiva'}">
                        </div>
                        ${editando ? `
                        <div class="field">
                            <label>Imagem do evento</label>
                            ${evento.imagem_url ? `<img src="${evento.imagem_url}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:0.5rem;">` : ''}
                            <input id="ev-imagem" type="file" accept="image/jpeg,image/png,image/webp,image/gif">
                            <small class="text-muted-soft">JPG, PNG, WebP ou GIF — máx. 5 MB</small>
                        </div>` : ''}
                        <div class="flex gap-2 mt-2">
                            <button type="button" class="btn-cb btn-cb--soft btn-cb--block" data-close>Cancelar</button>
                            <button type="submit" class="btn-cb btn-cb--primary btn-cb--block" id="btn-salvar-ev">
                                ${editando ? 'Salvar alterações' : 'Criar evento'}
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(bd);
            bd.addEventListener('click', e => {
                if (e.target === bd || e.target.closest('[data-close]')) bd.remove();
            });

            document.getElementById('form-evento').addEventListener('submit', async e => {
                e.preventDefault();
                const dataInicioVal = document.getElementById('ev-data-inicio')?.value;
                const payload = {
                    titulo:      document.getElementById('ev-titulo').value.trim(),
                    descricao:   document.getElementById('ev-descricao').value.trim() || null,
                    modalidade:  document.getElementById('ev-modalidade').value,
                    cor:         document.getElementById('ev-cor').value,
                    data:        document.getElementById('ev-data').value.trim(),
                    vagas:       parseInt(document.getElementById('ev-vagas').value) || 0,
                    local:       document.getElementById('ev-local').value.trim() || 'Quadra Poliesportiva',
                    bairro:      document.getElementById('ev-bairro')?.value.trim() || null,
                    data_inicio: dataInicioVal ? new Date(dataInicioVal).toISOString() : null,
                };
                const btn = document.getElementById('btn-salvar-ev');
                btn.disabled = true;
                try {
                    let evSalvo;
                    if (editando) {
                        evSalvo = await API.put(`/eventos/${evento.id}`, payload);
                        toast('Evento atualizado', 'success');
                    } else {
                        evSalvo = await API.post('/eventos', payload);
                        toast('Evento criado!', 'success');
                    }
                    const inputImg = document.getElementById('ev-imagem');
                    if (inputImg?.files?.[0]) {
                        const form = new FormData();
                        form.append('arquivo', inputImg.files[0]);
                        try {
                            await API.upload(`/eventos/${evSalvo.id}/imagem`, form);
                            toast('Imagem enviada!', 'success');
                        } catch (imgErr) {
                            toast('Evento salvo, mas falha ao enviar imagem: ' + (imgErr.message || ''), 'error');
                        }
                    }
                    bd.remove();
                    carregarEventosAdmin();
                } catch (err) {
                    toast(err.message || 'Erro ao salvar', 'error');
                    btn.disabled = false;
                }
            });
        }

        window.editarEvento = async function(id) {
            try { abrirFormEvento(await API.get(`/eventos/${id}`)); }
            catch { toast('Erro ao carregar evento', 'error'); }
        };

        window.deletarEvento = async function(id, titulo) {
            const ok = await confirmar({
                titulo: 'Excluir evento?',
                mensagem: `"${titulo}" será removido junto com todas as inscrições. Esta ação não pode ser desfeita.`,
                textoOk: 'Sim, excluir', perigoso: true,
            });
            if (!ok) return;
            try { await API.delete(`/eventos/${id}`); toast('Evento excluído', 'info'); carregarEventosAdmin(); }
            catch (err) { toast(err.message || 'Erro', 'error'); }
        };

        window.verInscritos = async function(id, titulo) {
            try {
                const lista = await API.get(`/admin/eventos/${id}/inscritos`);
                const bd = document.createElement('div');
                bd.className = 'cb-modal-backdrop';
                const corpo = lista.length === 0
                    ? '<p class="text-muted-soft">Nenhum inscrito ainda.</p>'
                    : `<table class="cb-table">
                           <thead><tr><th>Nome</th><th>E-mail</th><th>Bairro</th></tr></thead>
                           <tbody>${lista.map(u => `
                               <tr>
                                   <td data-label="Nome">${escapeHTML(u.nome)}</td>
                                   <td data-label="E-mail" class="text-muted-soft">${escapeHTML(u.email)}</td>
                                   <td data-label="Bairro" class="text-muted-soft">${escapeHTML(u.bairro || '—')}</td>
                               </tr>`).join('')}
                           </tbody>
                       </table>`;
                bd.innerHTML = `
                    <div class="cb-modal cb-modal--wide">
                        <h3>${escapeHTML(titulo)}</h3>
                        <p class="text-muted-soft mt-neg">${lista.length} ${lista.length === 1 ? 'inscrito' : 'inscritos'}</p>
                        <div class="mt-2">${corpo}</div>
                        <div class="flex gap-2 mt-2">
                            ${lista.length > 0 ? `<a href="/admin/eventos/${id}/inscritos/csv" download class="btn-cb btn-cb--soft btn-cb--block"><i class="bi bi-download"></i> Exportar CSV</a>` : ''}
                            <button class="btn-cb btn-cb--ghost btn-cb--block" data-close>Fechar</button>
                        </div>
                    </div>`;
                document.body.appendChild(bd);
                bd.addEventListener('click', e => {
                    if (e.target === bd || e.target.closest('[data-close]')) bd.remove();
                });
            } catch { toast('Erro ao carregar inscritos', 'error'); }
        };

        document.getElementById('btn-novo-evento').addEventListener('click', () => abrirFormEvento());

        // ==========================================================
        // USUÁRIOS
        // ==========================================================
        async function carregarUsuarios() {
            const cont = document.getElementById('lista-usuarios');
            cont.innerHTML = '<div class="cb-spinner"></div>';
            try {
                const usuarios = await API.get('/admin/usuarios');
                if (usuarios.length === 0) {
                    cont.innerHTML = '<p class="text-muted-soft">Nenhum usuário cadastrado.</p>';
                    return;
                }
                cont.innerHTML = `
                    <table class="cb-table">
                        <thead>
                            <tr>
                                <th>Nome</th><th>E-mail</th><th>Bairro</th>
                                <th>Função</th><th>Status</th><th class="text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${usuarios.map(u => {
                                const ehVoce = u.id === usuario.id;
                                return `
                                <tr>
                                    <td data-label="Nome" class="text-bold">
                                        ${escapeHTML(u.nome)}${ehVoce ? ' <span class="text-muted-soft text-normal">(você)</span>' : ''}
                                        ${u.precisa_cesta_basica ? ' <span class="badge-cesta" title="Solicitou cesta básica"><i class="bi bi-box-seam"></i></span>' : ''}
                                    </td>
                                    <td data-label="E-mail" class="text-muted-soft">${escapeHTML(u.email)}</td>
                                    <td data-label="Bairro" class="text-muted-soft">${escapeHTML(u.bairro || '—')}</td>
                                    <td data-label="Função">
                                        <span class="status-pill ${u.role==='admin' ? 'status-pill--admin' : ''}">${u.role}</span>
                                    </td>
                                    <td data-label="Status">
                                        <span class="status-pill status-pill--${u.ativo ? 'ativo' : 'inativo'}">${u.ativo ? 'Ativo' : 'Inativo'}</span>
                                    </td>
                                    <td data-label="Ações" class="text-right">
                                        ${ehVoce ? '' : `
                                            <button class="btn-cb btn-cb--sm btn-cb--ghost" onclick="alterarRole(${u.id}, '${u.role}')">
                                                ${u.role === 'admin' ? 'Tornar morador' : 'Tornar admin'}
                                            </button>
                                            <button class="btn-cb btn-cb--sm btn-cb--soft" onclick="alterarAtivo(${u.id}, ${u.ativo})">
                                                ${u.ativo ? 'Desativar' : 'Ativar'}
                                            </button>
                                            <button class="btn-cb btn-cb--sm btn-cb--danger" onclick="excluirUsuario(${u.id}, '${escapeHTML(u.nome).replace(/'/g,"\\'")}')">
                                                <i class="bi bi-trash3"></i>
                                            </button>`}
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>`;
            } catch (err) {
                if (err.status === 401) { sair(true); return; }
                toast('Erro ao carregar usuários', 'error');
            }
        }

        window.alterarRole = async function(id, atual) {
            const novo = atual === 'admin' ? 'morador' : 'admin';
            const ok = await confirmar({ titulo: 'Alterar função?', mensagem: `Este usuário passará a ser <strong>${novo}</strong>.`, textoOk: 'Confirmar' });
            if (!ok) return;
            try { await API.put(`/admin/usuarios/${id}`, { role: novo }); toast('Função alterada', 'success'); carregarUsuarios(); }
            catch (err) { toast(err.message, 'error'); }
        };

        window.alterarAtivo = async function(id, ativoAtual) {
            try {
                await API.put(`/admin/usuarios/${id}`, { ativo: !ativoAtual });
                toast(ativoAtual ? 'Usuário desativado' : 'Usuário reativado', 'info');
                carregarUsuarios();
            } catch (err) { toast(err.message, 'error'); }
        };

        window.excluirUsuario = async function(id, nome) {
            const ok = await confirmar({ titulo: 'Excluir usuário?', mensagem: `<strong>${nome}</strong> será removido permanentemente.`, textoOk: 'Excluir', perigoso: true });
            if (!ok) return;
            try { await API.delete(`/admin/usuarios/${id}`); toast('Usuário excluído', 'info'); carregarUsuarios(); }
            catch (err) { toast(err.message, 'error'); }
        };

        // Boot
        carregarDashboard();
    </script>
</body>
</html>
