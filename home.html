<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos - Sara Social</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center" style="max-width: 500px;">
            <a class="navbar-brand fw-bold text-primary m-0" href="#">
                <i class="bi bi-geo-alt-fill"></i> Sara Social
            </a>
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 35px; height: 35px;">
                <i class="bi bi-person-fill"></i>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 500px;">
        <h4 class="fw-bold text-dark mb-3">Próximos Eventos</h4>
        
        <div class="d-flex gap-2 overflow-auto mb-4 pb-2" style="white-space: nowrap;">
            <button class="btn btn-primary rounded-pill px-4 btn-filtro" data-filtro="Todos">Todos</button>
            <button class="btn btn-outline-primary rounded-pill px-4 btn-filtro" data-filtro="Futebol">Futebol</button>
            <button class="btn btn-outline-primary rounded-pill px-4 btn-filtro" data-filtro="Zumba">Zumba</button>
            <button class="btn btn-outline-primary rounded-pill px-4 btn-filtro" data-filtro="Capoeira">Capoeira</button>
            <button class="btn btn-outline-primary rounded-pill px-4 btn-filtro" data-filtro="Outros">Outros</button>
        </div>
        
        <div id="lista-eventos" class="d-flex flex-column gap-3 mb-5">
            <div class="text-center text-muted my-5">
                <div class="spinner-border text-primary mb-2" role="status"></div>
                <p>Buscando eventos...</p>
            </div>
        </div>
    </div>

    <button class="btn btn-primary rounded-circle shadow-lg position-fixed bottom-0 end-0 m-4 d-flex align-items-center justify-content-center" 
            style="width: 60px; height: 60px; z-index: 1000;"
            data-bs-toggle="modal" data-bs-target="#modalNovoEvento">
        <i class="bi bi-plus-lg fs-3"></i>
    </button>

    <div class="modal fade" id="modalNovoEvento" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 500px; margin: 0 auto;">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white border-0">
                    <h5 class="modal-title fw-bold">Criar Novo Evento</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-novo-evento">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Nome do Evento</label>
                            <input type="text" class="form-control bg-light border-0" id="nome-evento" placeholder="Ex: Aula de Zumba" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label text-muted small fw-bold">Data</label>
                                <input type="date" class="form-control bg-light border-0" id="data-evento" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label text-muted small fw-bold">Hora</label>
                                <input type="time" class="form-control bg-light border-0" id="hora-evento" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Categoria</label>
                            <select class="form-select bg-light border-0" id="categoria-evento" required>
                                <option value="" selected disabled>Selecione uma categoria...</option>
                                <option value="Futebol">Futebol</option>
                                <option value="Zumba">Zumba</option>
                                <option value="Capoeira">Capoeira</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2 shadow-sm">
                            Salvar Evento
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
