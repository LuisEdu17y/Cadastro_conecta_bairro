<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conecta Bairro - Morador</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="app-morador.css">
</head>
<body>

    <div class="app-container">
        
        <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
            <div class="d-flex align-items-center">
                <img src="https://ui-avatars.com/api/?name=Maria+Silva&background=ffb6c1&color=fff&rounded=true" width="50" alt="Perfil" class="shadow-sm rounded-circle">
                <div class="ms-3">
                    <h5 class="mb-0 fw-bold">Maria</h5>
                    <small class="text-muted">Bairro Central</small>
                </div>
            </div>
            <div class="position-relative">
                <i class="bi bi-bell fs-4 text-dark"></i>
                <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
            </div>
        </div>

        <div class="card glass-card p-3 mb-4">
            <div class="d-flex justify-content-between mb-2">
                <h6 class="fw-bold mb-0">Seu Perfil</h6>
                <span class="badge bg-success rounded-pill">Perfil Completo!</span>
            </div>
            <div class="progress" style="height: 8px;">
                <div class="progress-bar bg-success" role="progressbar" style="width: 100%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <small class="text-muted mt-2 d-block">Entrada aos dados recompensa dada</small>
        </div>

        <h6 class="fw-bold mb-2">Filtro de evento</h6>
        <div class="scroll-horizontal mb-4">
            <button class="filtro-pill active">Todas</button>
            <button class="filtro-pill" style="color: #0d6efd; border-color: #0d6efd;">Futebol</button>
            <button class="filtro-pill" style="color: #d63384; border-color: #d63384;">Zumba</button>
            <button class="filtro-pill" style="color: #fd7e14; border-color: #fd7e14;">Capoeira</button>
        </div>

        <div id="feed-eventos">
            <div class="text-center text-muted my-4">
                <div class="spinner-border text-success" role="status"></div>
                <p>Carregando eventos...</p>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="bi bi-house-door-fill"></i>
            Home
        </a>
        <a href="#" class="nav-item">
            <i class="bi bi-calendar-check"></i>
            Meus Eventos
        </a>
        <a href="#" class="nav-item">
            <i class="bi bi-megaphone"></i>
            Comunicados
        </a>
        <a href="#" class="nav-item">
            <i class="bi bi-person"></i>
            Perfil
        </a>
    </div>

    <div class="modal fade" id="modalConfirmacao" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 20px; border: none;">
                <div class="modal-body text-center p-4">
                    
                    <h4 class="fw-bold text-primary mb-3">Confirmar Presença<br>Grátis</h4>
                    
                    <div class="rounded-circle bg-info bg-opacity-10 d-inline-flex justify-content-center align-items-center mb-3" style="width: 80px; height: 80px;">
                        <i class="bi bi-check-lg text-primary" style="font-size: 3rem;"></i>
                    </div>

                    <div class="text-start bg-light p-3 rounded-4 mb-3">
                        <h5 class="fw-bold mb-2" id="modal-titulo"><i class="bi bi-heptagon-half"></i> Evento</h5>
                        <p class="mb-1 text-muted small"><strong class="text-dark">Data:</strong> <span id="modal-data"></span></p>
                        <p class="mb-0 text-muted small"><strong class="text-dark">Local:</strong> Quadra Poliesportiva <a href="#" class="text-decoration-none">(ver no mapa)</a></p>
                    </div>

                    <p class="small fw-bold text-dark">Sua vaga é de graça!<br>Confirmar ajuda a organização.</p>

                    <div class="d-flex gap-2 mt-4">
                        <button type="button" class="btn btn-outline-secondary rounded-pill w-50 fw-bold" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-success rounded-pill w-50 fw-bold" onclick="confirmarPresenca()">Sim, Eu Vou!</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>




    <script src="app-morador.js"></script>
</body>
</html>
